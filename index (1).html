<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordy – English Made Fun! 🌟</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

      * { box-sizing: border-box; }

      :root {
        --bg1: #fff9e6;
        --bg2: #fff0f8;
        --card: rgba(255,255,255,0.97);
        --text: #2a1a4a;
        --muted: #7a6a8a;
        --primary: #ff6b6b;
        --primary-dark: #e84f4f;
        --green: #3ecf8e;
        --green-dark: #28a870;
        --blue: #4d9de0;
        --yellow: #ffd166;
        --purple: #9b5de5;
        --shadow: 0 18px 45px rgba(100,50,150,0.13);
        --radius: 28px;
        --font: 'Nunito', Arial, sans-serif;
      }

      /* ── RESET & BASE ────────────────────────────── */
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, #ffe8f0 0%, transparent 35%),
          radial-gradient(circle at 90% 5%,  #e8f4ff 0%, transparent 30%),
          radial-gradient(circle at 50% 90%, #efffef 0%, transparent 40%),
          linear-gradient(160deg, #fff9e6 0%, #fff0f8 50%, #eef6ff 100%);
        overflow-x: hidden;
      }

      /* floating bg stars */
      body::before {
        content: "⭐ 🌈 ✨ 🌟 💫 ⭐ 🌈";
        position: fixed;
        top: -10px;
        left: 0;
        width: 100%;
        font-size: 22px;
        letter-spacing: 80px;
        opacity: 0.18;
        pointer-events: none;
        animation: drift 18s linear infinite;
        z-index: 0;
      }
      @keyframes drift {
        from { transform: translateX(-80px); }
        to   { transform: translateX(80px); }
      }

      #app { min-height: 100vh; position: relative; z-index: 1; }

      /* ── AUTH SCREEN ────────────────────────────── */
      .auth-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px 18px;
      }

      .auth-card {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        border-radius: 36px;
        padding: 36px 32px;
        box-shadow: var(--shadow), 0 0 0 4px rgba(255,107,107,0.07);
        border: 2.5px solid rgba(255,255,255,0.95);
        position: relative;
        overflow: hidden;
      }
      .auth-card::before {
        content: "";
        position: absolute;
        top: -60px; right: -60px;
        width: 200px; height: 200px;
        background: radial-gradient(circle, #ffe8f0 0%, transparent 70%);
        pointer-events: none;
      }

      /* Brand */
      .brand { text-align: center; margin-bottom: 28px; }
      .brand-badge {
        width: 96px; height: 96px;
        margin: 0 auto 16px;
        border-radius: 30px;
        display: grid; place-items: center;
        font-size: 40px; font-weight: 900;
        color: white;
        background: linear-gradient(135deg, #ff6b6b, #ff9b42);
        box-shadow: 0 12px 30px rgba(255,107,107,0.35),
                    inset 0 1px 0 rgba(255,255,255,0.4);
        position: relative;
        animation: badge-wobble 3s ease-in-out infinite;
      }
      @keyframes badge-wobble {
        0%,100% { transform: rotate(-2deg) scale(1);   }
        50%      { transform: rotate( 2deg) scale(1.04); }
      }
      .brand-badge::after {
        content: "✨";
        position: absolute;
        right: 6px; top: 4px;
        font-size: 18px;
        animation: spin-star 4s linear infinite;
      }
      @keyframes spin-star {
        0%   { transform: rotate(0deg)   scale(1);   }
        50%  { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1);   }
      }
      .brand h1 {
        margin: 0;
        font-size: 44px;
        font-weight: 900;
        background: linear-gradient(135deg, #ff6b6b 0%, #ff9b42 50%, #ffd166 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 1px;
      }
      .brand p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 17px;
        font-weight: 700;
      }
      .brand-stars {
        margin-top: 8px;
        font-size: 22px;
        letter-spacing: 4px;
      }

      /* Tabs */
      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 22px;
        background: #f5f0ff;
        padding: 6px;
        border-radius: 20px;
      }
      .tab-btn {
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        background: transparent;
        color: #9b80c0;
        transition: 0.2s;
        font-family: var(--font);
      }
      .tab-btn.active {
        background: white;
        color: var(--purple);
        box-shadow: 0 6px 16px rgba(155,93,229,0.15);
      }

      /* Fields */
      .field { margin-bottom: 16px; }
      .field label {
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 8px;
        font-size: 15px;
        color: var(--text);
        font-weight: 800;
      }
      .field label .lbl-icon { font-size: 18px; }
      .input {
        width: 100%;
        border: 2.5px solid #e8e0f5;
        background: #faf8ff;
        border-radius: 16px;
        padding: 16px 18px;
        font-size: 16px;
        font-weight: 700;
        outline: none;
        transition: 0.2s;
        font-family: var(--font);
        color: var(--text);
      }
      .input::placeholder { color: #c0b8d0; font-weight: 600; }
      .input:focus {
        border-color: var(--purple);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(155,93,229,0.12);
      }

      /* Avatar card */
      .avatar-card {
        margin-top: 6px;
        background: linear-gradient(135deg, #fff8e6, #fff0f8);
        border: 2.5px solid #fde0cc;
        border-radius: 26px;
        padding: 20px;
      }
      .avatar-title {
        font-size: 15px; font-weight: 800;
        color: var(--text);
        margin-bottom: 14px;
        text-align: center;
      }
      .avatar-picker {
        display: grid;
        grid-template-columns: 60px 1fr 60px;
        align-items: center;
        gap: 10px;
      }
      .arrow-btn {
        width: 60px; height: 60px;
        border: none;
        border-radius: 18px;
        cursor: pointer;
        font-size: 28px;
        background: white;
        box-shadow: 0 6px 18px rgba(0,0,0,0.09);
        transition: transform 0.15s, box-shadow 0.15s;
        font-family: var(--font);
      }
      .arrow-btn:hover { transform: scale(1.08); box-shadow: 0 10px 22px rgba(0,0,0,0.14); }
      .arrow-btn:active { transform: scale(0.95); }
      .avatar-preview {
        text-align: center;
        background: white;
        border-radius: 22px;
        padding: 18px 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.07);
        border: 2px solid #f5e8ff;
      }
      .avatar-big {
        font-size: 70px; line-height: 1;
        margin-bottom: 10px;
        filter: drop-shadow(0 6px 12px rgba(0,0,0,0.14));
        animation: avatar-bounce 2s ease-in-out infinite;
      }
      @keyframes avatar-bounce {
        0%,100% { transform: translateY(0);  }
        50%      { transform: translateY(-6px); }
      }
      .avatar-name {
        font-size: 18px; font-weight: 900; color: var(--text);
        margin-bottom: 4px;
      }
      .avatar-desc {
        font-size: 13px; color: var(--muted); font-weight: 600;
        min-height: 18px;
      }

      /* Buttons */
      .action-btn {
        width: 100%;
        border: none;
        border-radius: 20px;
        padding: 18px;
        font-size: 18px;
        font-weight: 900;
        cursor: pointer;
        background: linear-gradient(135deg, #ff6b6b, #ff9b42);
        color: white;
        box-shadow: 0 10px 28px rgba(255,107,107,0.35);
        margin-top: 18px;
        transition: transform 0.15s, box-shadow 0.15s;
        font-family: var(--font);
        letter-spacing: 0.5px;
      }
      .action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 34px rgba(255,107,107,0.42);
      }
      .action-btn:active { transform: translateY(1px); }

      .secondary-btn {
        width: 100%;
        border: 2.5px solid #e8e0f5;
        border-radius: 16px;
        padding: 14px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        background: white;
        color: var(--purple);
        margin-top: 10px;
        transition: 0.15s;
        font-family: var(--font);
      }
      .secondary-btn:hover { background: #f5f0ff; }

      .hint {
        margin-top: 14px; text-align: center;
        color: #e85d5d;
        font-size: 14px; font-weight: 700;
        min-height: 20px;
        animation: shake-in 0.3s ease;
      }
      @keyframes shake-in {
        0%   { transform: translateX(-4px); }
        25%  { transform: translateX( 4px); }
        50%  { transform: translateX(-2px); }
        100% { transform: translateX(0);    }
      }

      /* ── TOPBAR ─────────────────────────────────── */
      .topbar {
        position: sticky; top: 0; z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 20px;
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(14px);
        border-bottom: 2px solid rgba(155,93,229,0.08);
        box-shadow: 0 4px 20px rgba(155,93,229,0.07);
      }
      .top-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
      .mini-avatar {
        width: 58px; height: 58px;
        border-radius: 18px;
        display: grid; place-items: center;
        font-size: 32px;
        background: linear-gradient(135deg, #fff5e6, #fff0f8);
        box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        border: 2.5px solid #ffe4cc;
        flex-shrink: 0;
      }
      .user-meta { min-width: 0; }
      .user-name {
        font-size: 18px; font-weight: 900;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        color: var(--text);
      }
      .user-sub {
        margin-top: 2px; color: var(--muted);
        font-size: 13px; font-weight: 700;
        display: flex; align-items: center; gap: 4px;
      }
      .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
      .pill-btn {
        border: none;
        border-radius: 999px;
        padding: 11px 18px;
        font-size: 14px; font-weight: 800;
        cursor: pointer;
        background: white;
        color: var(--purple);
        box-shadow: 0 6px 16px rgba(155,93,229,0.12);
        border: 2px solid #ede0ff;
        transition: 0.15s;
        font-family: var(--font);
      }
      .pill-btn:hover { background: #f5f0ff; transform: translateY(-1px); }

      /* ── MAP SECTION ────────────────────────────── */
      .map-wrap { padding: 16px 16px 60px; }
      .world-card {
        max-width: 940px;
        margin: 0 auto 18px;
        background: white;
        border-radius: 26px;
        padding: 18px 22px;
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        flex-wrap: wrap;
        border: 2.5px solid rgba(155,93,229,0.08);
      }
      .world-title { font-size: 22px; font-weight: 900; color: var(--text); }
      .world-sub { color: var(--muted); font-size: 14px; margin-top: 5px; font-weight: 700; }
      .world-progress {
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; font-weight: 800; color: var(--muted);
      }
      .progress-bar {
        width: 110px; height: 12px;
        background: #f0e8ff;
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--purple), #ff6b6b);
        border-radius: 999px;
        transition: width 0.5s ease;
      }

      /* ── MAP CANVAS ─────────────────────────────── */
      .map {
        position: relative;
        width: 100%; max-width: 940px;
        height: 1820px;
        margin: 0 auto;
        border-radius: 36px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(100,50,150,0.16);
        transition: background 0.8s ease, box-shadow 0.8s ease;
      }

      /* World 1 – sunny meadow */
      .map.world-1 {
        background:
          radial-gradient(circle at 15% 5%,  rgba(255,255,220,0.7) 0%, transparent 20%),
          radial-gradient(circle at 85% 8%,  rgba(255,255,200,0.5) 0%, transparent 18%),
          linear-gradient(180deg,
            #87e8ff 0%, #b0f0ff 8%,        /* sky */
            #c8f7d0 8%, #c8f7d0 12%,       /* horizon */
            #a8f0b8 12%, #a8f0b8 28%,
            #c0f5c8 28%, #c0f5c8 44%,
            #a8f0b8 44%, #a8f0b8 60%,
            #b8f2c4 60%, #b8f2c4 76%,
            #a0ecb4 76%, #a0ecb4 100%
          );
        box-shadow: 0 20px 50px rgba(50,150,80,0.15);
      }

      /* World 2 – magical night */
      .map.world-2 {
        background:
          radial-gradient(circle at 20% 6%,  rgba(255,255,150,0.22) 0%, transparent 14%),
          radial-gradient(circle at 75% 10%, rgba(200,180,255,0.18) 0%, transparent 12%),
          linear-gradient(180deg, #0d1b3e 0%, #1a2d5a 20%, #24407a 45%, #1e3568 70%, #162850 100%);
        box-shadow: 0 20px 50px rgba(10,20,60,0.38);
      }

      /* Decorative map overlays */
      .map.world-1::before {
        content: "☀️";
        position: absolute;
        top: 18px; right: 26px;
        font-size: 52px;
        filter: drop-shadow(0 4px 12px rgba(255,200,0,0.5));
        animation: sun-spin 14s linear infinite;
        z-index: 2; pointer-events: none;
      }
      @keyframes sun-spin {
        from { transform: rotate(0deg);   }
        to   { transform: rotate(360deg); }
      }
      .map.world-1::after {
        content: "☁️     ☁️";
        position: absolute;
        top: 28px; left: 14px;
        font-size: 36px;
        opacity: 0.85;
        animation: cloud-float 12s ease-in-out infinite;
        z-index: 2; pointer-events: none;
        letter-spacing: 60px;
      }
      @keyframes cloud-float {
        0%,100% { transform: translateX(0);   }
        50%      { transform: translateX(24px); }
      }
      .map.world-2::before {
        content: "";
        position: absolute; inset: 0;
        background:
          radial-gradient(circle at 10% 6%,  rgba(255,255,200,0.9) 0 2px, transparent 3px),
          radial-gradient(circle at 26% 3%,  rgba(255,255,210,0.8) 0 1.5px, transparent 2.5px),
          radial-gradient(circle at 44% 8%,  rgba(255,255,220,0.9) 0 2px, transparent 3px),
          radial-gradient(circle at 60% 4%,  rgba(255,255,200,0.8) 0 1.5px, transparent 2.5px),
          radial-gradient(circle at 76% 9%,  rgba(255,255,210,0.9) 0 2px, transparent 3px),
          radial-gradient(circle at 90% 3%,  rgba(255,255,200,0.8) 0 1.5px, transparent 2.5px),
          radial-gradient(circle at 33% 15%, rgba(255,255,230,0.85) 0 1.5px, transparent 2.5px),
          radial-gradient(circle at 55% 18%, rgba(255,255,220,0.8) 0 2px, transparent 3px),
          radial-gradient(circle at 80% 20%, rgba(255,255,210,0.85) 0 1.5px, transparent 2.5px);
        pointer-events: none; z-index: 1;
      }
      .map.world-2::after {
        content: "🌙";
        position: absolute;
        top: 24px; right: 28px;
        font-size: 50px;
        opacity: 0.95;
        animation: moon-glow 3s ease-in-out infinite alternate;
        z-index: 2; pointer-events: none;
      }
      @keyframes moon-glow {
        from { filter: drop-shadow(0 0 6px rgba(200,180,255,0.5));  }
        to   { filter: drop-shadow(0 0 20px rgba(200,180,255,0.9)); }
      }

      /* Path line */
      .path-line {
        position: absolute; height: 10px;
        border-radius: 999px;
        transform-origin: left center;
        z-index: 1;
        transition: background 0.6s ease;
      }
      .map.world-1 .path-line {
        background: repeating-linear-gradient(
          90deg, rgba(255,255,255,0.7) 0 18px, transparent 18px 30px
        );
      }
      .map.world-2 .path-line {
        background: repeating-linear-gradient(
          90deg, rgba(180,210,255,0.55) 0 18px, transparent 18px 30px
        );
      }

      /* Level buttons */
      .level {
        position: absolute;
        width: 84px; height: 84px;
        border-radius: 50%;
        border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 26px; font-weight: 900;
        color: white; z-index: 3;
        box-shadow: 0 10px 24px rgba(0,0,0,0.15);
        transition: transform 0.18s, box-shadow 0.18s, background 0.5s;
        font-family: var(--font);
      }
      .level:hover { transform: scale(1.1); box-shadow: 0 16px 30px rgba(0,0,0,0.22); }
      .level:active { transform: scale(0.96); }

      .level.open  { background: radial-gradient(circle at 30% 30%, #6fe49a, #28a870); }
      .level.open:hover { background: radial-gradient(circle at 30% 30%, #86ffb2, #30c880); }

      .map.world-2 .level.open  { background: radial-gradient(circle at 30% 30%, #91c4ff, #4a78e8); }

      .level.current {
        box-shadow:
          0 0 0 6px rgba(255,255,255,0.9),
          0 0 0 13px rgba(111,228,154,0.35),
          0 12px 26px rgba(0,0,0,0.16);
        animation: current-pulse 2s ease-in-out infinite;
      }
      @keyframes current-pulse {
        0%,100% { box-shadow: 0 0 0 6px rgba(255,255,255,0.9), 0 0 0 13px rgba(111,228,154,0.30), 0 12px 26px rgba(0,0,0,0.16); }
        50%      { box-shadow: 0 0 0 6px rgba(255,255,255,0.9), 0 0 0 20px rgba(111,228,154,0.15), 0 12px 26px rgba(0,0,0,0.16); }
      }
      .map.world-2 .level.current {
        animation: current-pulse-night 2s ease-in-out infinite;
      }
      @keyframes current-pulse-night {
        0%,100% { box-shadow: 0 0 0 6px rgba(255,255,255,0.8), 0 0 0 13px rgba(145,196,255,0.30), 0 12px 26px rgba(0,0,0,0.22); }
        50%      { box-shadow: 0 0 0 6px rgba(255,255,255,0.8), 0 0 0 22px rgba(145,196,255,0.12), 0 12px 26px rgba(0,0,0,0.22); }
      }

      .level.locked {
        background: linear-gradient(180deg, #e0d8f0, #c8c0dc);
        color: #a898c0; cursor: not-allowed;
        box-shadow: 0 6px 14px rgba(0,0,0,0.1);
      }
      .level.locked:hover { transform: scale(1.03); }

      .map.world-2 .level.locked {
        background: linear-gradient(180deg, #3a4d7a, #28395e);
        color: #8898c8;
      }

      .level.done {
        background: radial-gradient(circle at 30% 30%, #4fd190, #21885a);
        font-size: 22px;
      }
      .map.world-2 .level.done {
        background: radial-gradient(circle at 30% 30%, #7bb4ff, #3f6acc);
      }

      .level-label {
        position: absolute;
        left: 50%; transform: translateX(-50%);
        bottom: -26px;
        font-size: 11px; font-weight: 800;
        white-space: nowrap;
        pointer-events: none;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.75);
        color: #5a4a7a;
      }
      .map.world-2 .level-label {
        background: rgba(20,35,80,0.55);
        color: #c8d8ff;
      }

      /* Player token */
      .player {
        position: absolute;
        width: 76px; height: 76px;
        border-radius: 50%;
        display: grid; place-items: center;
        font-size: 44px;
        background: rgba(255,255,255,0.97);
        box-shadow: 0 14px 28px rgba(0,0,0,0.18), 0 0 0 4px rgba(255,255,255,0.9);
        z-index: 5;
        transition: left 0.55s cubic-bezier(.34,1.56,.64,1), top 0.55s cubic-bezier(.34,1.56,.64,1);
        border: 3px solid rgba(255,255,255,0.95);
      }
      .player.bounce { animation: player-bounce 0.35s ease; }
      @keyframes player-bounce {
        0%   { transform: scale(1);    }
        40%  { transform: scale(1.18); }
        70%  { transform: scale(0.94); }
        100% { transform: scale(1);    }
      }

      /* Map title badge */
      .map-title {
        position: absolute;
        top: 100px; left: 50%;
        transform: translateX(-50%);
        z-index: 4;
        background: rgba(255,255,255,0.92);
        padding: 14px 24px;
        border-radius: 999px;
        font-size: 18px; font-weight: 900;
        box-shadow: 0 8px 22px rgba(0,0,0,0.1);
        border: 2.5px solid rgba(255,255,255,0.9);
        white-space: nowrap;
      }
      .map.world-2 .map-title {
        background: rgba(18,30,70,0.70);
        color: #e8f0ff;
        border-color: rgba(180,200,255,0.2);
      }

      /* Decorative bubbles */
      .bubble {
        position: absolute;
        border-radius: 50%;
        filter: blur(2px);
        z-index: 0;
        transition: background 0.6s ease;
      }
      .map.world-1 .bubble { background: rgba(255,255,255,0.25); }
      .map.world-2 .bubble { background: rgba(160,200,255,0.12); }

      /* Grass / terrain decorations */
      .terrain-deco {
        position: absolute;
        font-size: 26px;
        z-index: 2;
        pointer-events: none;
        opacity: 0.85;
      }

      /* ── MODAL ──────────────────────────────────── */
      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(20,10,40,0.45);
        display: flex; align-items: center; justify-content: center;
        padding: 20px; z-index: 50;
        backdrop-filter: blur(4px);
        animation: modal-in 0.25s ease;
      }
      @keyframes modal-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .modal {
        width: 100%; max-width: 450px;
        background: white;
        border-radius: 32px;
        padding: 30px 26px;
        box-shadow: 0 28px 60px rgba(0,0,0,0.28);
        animation: modal-slide 0.3s cubic-bezier(.34,1.56,.64,1);
        border: 2.5px solid rgba(155,93,229,0.1);
      }
      @keyframes modal-slide {
        from { transform: translateY(30px) scale(0.95); opacity: 0; }
        to   { transform: translateY(0)    scale(1);    opacity: 1; }
      }
      .modal h3 {
        margin: 0 0 6px;
        font-size: 26px; font-weight: 900; color: var(--text);
        display: flex; align-items: center; gap: 8px;
      }
      .modal p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 16px; font-weight: 700;
        line-height: 1.6;
      }

      /* Quiz */
      .quiz-header {
        text-align: center;
        margin-bottom: 14px;
      }
      .quiz-emoji {
        font-size: 48px;
        display: block;
        margin-bottom: 4px;
        animation: quiz-emoji-pop 0.5s cubic-bezier(.34,1.56,.64,1);
      }
      @keyframes quiz-emoji-pop {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
      .quiz-label {
        font-size: 14px; font-weight: 800;
        color: var(--muted);
        text-transform: uppercase; letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .quiz-word {
        font-size: 46px; font-weight: 900;
        text-align: center;
        margin: 0 0 22px;
        color: var(--text);
        background: linear-gradient(135deg, var(--purple), #ff6b6b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        animation: word-zoom 0.45s cubic-bezier(.34,1.56,.64,1);
      }
      @keyframes word-zoom {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }

      .quiz-instruction {
        text-align: center;
        font-size: 15px; font-weight: 700;
        color: var(--muted);
        margin-bottom: 16px;
        background: #f5f0ff;
        padding: 10px 16px;
        border-radius: 14px;
      }

      .options-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 8px;
      }
      .option-btn {
        width: 100%;
        text-align: center;
        border: 2.5px solid #e8e0f5;
        background: #faf8ff;
        color: var(--text);
        border-radius: 18px;
        padding: 16px 20px;
        font-size: 22px; font-weight: 900;
        cursor: pointer;
        transition: 0.15s;
        font-family: var(--font);
        position: relative;
        overflow: hidden;
      }
      .option-btn::before {
        content: "";
        position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(155,93,229,0.08), rgba(255,107,107,0.06));
        opacity: 0;
        transition: opacity 0.2s;
      }
      .option-btn:hover {
        border-color: var(--purple);
        background: #f5f0ff;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(155,93,229,0.15);
      }
      .option-btn:hover::before { opacity: 1; }
      .option-btn:active { transform: scale(0.97); }
      .option-btn.correct {
        border-color: var(--green);
        background: #edfff5;
        color: #1a7a4a;
        animation: correct-flash 0.4s ease;
      }
      @keyframes correct-flash {
        0%,100% { transform: scale(1);    }
        50%      { transform: scale(1.04); }
      }
      .option-btn.wrong {
        border-color: #ff6b6b;
        background: #fff0f0;
        color: #cc3333;
        animation: wrong-shake 0.35s ease;
      }
      @keyframes wrong-shake {
        0%,100% { transform: translateX(0); }
        25%      { transform: translateX(-6px); }
        75%      { transform: translateX( 6px); }
      }

      .close-btn {
        margin-top: 4px;
        background: white;
        color: var(--muted);
        border-color: #e8e0f5;
      }

      /* ── POPUP TOAST ────────────────────────────── */
      .popup {
        position: fixed;
        top: 28px; left: 50%;
        transform: translateX(-50%) translateY(-24px);
        min-width: 280px; max-width: 92vw;
        padding: 18px 28px;
        border-radius: 22px;
        color: white;
        font-size: 17px; font-weight: 900;
        text-align: center;
        box-shadow: 0 18px 44px rgba(0,0,0,0.22);
        z-index: 9999;
        opacity: 0; pointer-events: none;
        transition: 0.3s cubic-bezier(.34,1.56,.64,1);
        font-family: var(--font);
        display: flex; align-items: center; justify-content: center; gap: 8px;
      }
      .popup.success { background: linear-gradient(135deg, #3ecf8e, #28a870); }
      .popup.error   { background: linear-gradient(135deg, #ff6b6b, #e84f4f); }
      .popup.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── WORLD TRANSITION ───────────────────────── */
      .world-transition {
        position: fixed; inset: 0; z-index: 10000;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(circle at center, rgba(80,40,140,0.30), rgba(10,5,25,0.90));
        opacity: 0; pointer-events: none;
        transition: opacity 0.6s ease;
      }
      .world-transition.show { opacity: 1; pointer-events: all; }
      .world-transition-card {
        width: min(460px,92vw);
        padding: 42px 32px;
        border-radius: 36px;
        text-align: center;
        background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06));
        backdrop-filter: blur(14px);
        border: 2px solid rgba(255,255,255,0.2);
        box-shadow: 0 28px 70px rgba(0,0,0,0.32);
        color: white;
        transform: scale(0.88);
        transition: transform 0.5s cubic-bezier(.34,1.56,.64,1);
      }
      .world-transition.show .world-transition-card { transform: scale(1); }
      .world-transition-emoji {
        font-size: 72px; margin-bottom: 14px;
        animation: pop-in 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s both;
      }
      @keyframes pop-in {
        from { transform: scale(0) rotate(-20deg); opacity: 0; }
        to   { transform: scale(1) rotate(0deg);   opacity: 1; }
      }
      .world-transition-title {
        font-size: 40px; font-weight: 900; margin-bottom: 10px;
        line-height: 1.1;
      }
      .world-transition-text { font-size: 18px; opacity: 0.9; font-weight: 700; }
      .world-transition-stars {
        margin-top: 16px; font-size: 28px; letter-spacing: 6px;
        animation: stars-appear 0.8s ease 0.4s both;
      }
      @keyframes stars-appear {
        from { opacity: 0; transform: scale(0.5); }
        to   { opacity: 1; transform: scale(1);   }
      }

      /* ── RESPONSIVE ─────────────────────────────── */
      @media (max-width: 700px) {
        .auth-card  { padding: 26px 22px; border-radius: 30px; }
        .map        { height: 1700px; border-radius: 30px; }
        .level      { width: 74px; height: 74px; font-size: 22px; }
        .player     { width: 68px; height: 68px; font-size: 40px; }
        .world-card { padding: 14px 16px; }
        .topbar     { align-items: flex-start; }
        .top-actions{ width: 100%; justify-content: flex-start; }
        .quiz-word  { font-size: 38px; }
        .option-btn { font-size: 20px; padding: 14px; }
      }
    </style>
  <script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
  <body>
    <div id="app"></div>
    <div id="popup" class="popup success">⭐ Done!</div>

    <script>
      /* ──────────────────────────────────────────────
         DATA
      ────────────────────────────────────────────── */
      const avatars = [
        { icon: "🦊", name: "Foxy",   desc: "Fast and smart 🧠"    },
        { icon: "🐼", name: "Panda",  desc: "Cute and calm 🍃"     },
        { icon: "🐯", name: "Tiger",  desc: "Brave learner 💪"     },
        { icon: "🐵", name: "Momo",   desc: "Playful & funny 😄"   },
        { icon: "🦁", name: "Leo",    desc: "Strong & confident 👑" },
        { icon: "🐰", name: "Bunny",  desc: "Sweet and quick 🌸"   },
        { icon: "🐸", name: "Froggy", desc: "Happy jumper 🎉"      },
        { icon: "🐻", name: "Bear",   desc: "Cozy and kind 🤗"     },
      ];

      /* Each entry has a visual emoji hint to make it more kid-friendly */
      const quizData = [
        { word:"Apple",  emoji:"🍎", correct:"تفاح",   options:["تفاح","كتاب","سيارة"] },
        { word:"Book",   emoji:"📚", correct:"كتاب",   options:["قلم","كتاب","باب"]     },
        { word:"Water",  emoji:"💧", correct:"ماء",    options:["خبز","حليب","ماء"]     },
        { word:"Cat",    emoji:"🐱", correct:"قطة",    options:["كلب","قطة","شجرة"]     },
        { word:"Sun",    emoji:"☀️", correct:"شمس",   options:["قمر","شمس","نجمة"]     },
        { word:"House",  emoji:"🏠", correct:"بيت",    options:["مدرسة","بيت","طاولة"]  },
        { word:"Milk",   emoji:"🥛", correct:"حليب",   options:["حليب","عصير","زيت"]    },
        { word:"Car",    emoji:"🚗", correct:"سيارة",  options:["قطار","دراجة","سيارة"] },
        { word:"Bird",   emoji:"🐦", correct:"طائر",   options:["سمكة","طائر","أسد"]    },
        { word:"School", emoji:"🏫", correct:"مدرسة",  options:["مستشفى","مدرسة","غرفة"]},
      ];

      /* ──────────────────────────────────────────────
         HELPERS
      ────────────────────────────────────────────── */
      let mode        = "signup";
      let avatarIndex = 0;

      const getUserKey    = u => "user_" + u.trim().toLowerCase();
      const getCurrentUser= () => localStorage.getItem("currentUser");
      const setCurrentUser= u  => localStorage.setItem("currentUser", u.trim().toLowerCase());
      const getUserData   = u  => { const r = localStorage.getItem(getUserKey(u)); return r ? JSON.parse(r) : null; };
      const saveUserData  = (u,d) => localStorage.setItem(getUserKey(u), JSON.stringify(d));

      /* ──────────────────────────────────────────────
         POPUP TOAST
      ────────────────────────────────────────────── */
      function showPopup(text, isError = false) {
        const popup = document.getElementById("popup");
        if (!popup) return;
        popup.textContent = isError ? "❌ " + text : "⭐ " + text;
        popup.className = isError ? "popup error" : "popup success";
        popup.classList.add("show");
        clearTimeout(window.popupTimer);
        window.popupTimer = setTimeout(() => popup.classList.remove("show"), 2400);
      }

      /* ──────────────────────────────────────────────
         WORLD TRANSITION
      ────────────────────────────────────────────── */
      function showWorldTransition(worldNumber) {
        const old = document.getElementById("worldTransition");
        if (old) old.remove();
        const cfg = worldNumber === 2
          ? { emoji:"🌙✨", title:"World 2 Unlocked! 🎉", sub:"A magical night sky awaits you!", stars:"⭐🌟💫🌟⭐" }
          : { emoji:"🌿🌟", title:"Welcome to World 1!",   sub:"Your learning adventure begins!",  stars:"⭐✨⭐✨⭐" };
        const overlay = document.createElement("div");
        overlay.className = "world-transition";
        overlay.id = "worldTransition";
        overlay.innerHTML = `
          <div class="world-transition-card">
            <div class="world-transition-emoji">${cfg.emoji}</div>
            <div class="world-transition-title">${cfg.title}</div>
            <div class="world-transition-text">${cfg.sub}</div>
            <div class="world-transition-stars">${cfg.stars}</div>
          </div>`;
        document.body.appendChild(overlay);
        requestAnimationFrame(() => overlay.classList.add("show"));
        setTimeout(() => {
          overlay.classList.remove("show");
          setTimeout(() => overlay.remove(), 650);
        }, 2200);
      }

      /* ──────────────────────────────────────────────
         AUTH SCREEN
      ────────────────────────────────────────────── */
      function showAuth(message = "") {
        const av = avatars[avatarIndex];
        document.getElementById("app").innerHTML = `
          <div class="auth-wrap">
            <div class="auth-card">
              <div class="brand">
                <div class="brand-badge">W</div>
                <h1>Wordy</h1>
                <p>English Made Fun! 🎉</p>
                <div class="brand-stars">⭐ 🌟 ⭐ 🌟 ⭐</div>
              </div>

              <div class="tabs">
                <button class="tab-btn ${mode==="signup"?"active":""}" onclick="switchMode('signup')">
                  🆕 Sign Up
                </button>
                <button class="tab-btn ${mode==="login"?"active":""}" onclick="switchMode('login')">
                  🔑 Login
                </button>
              </div>

              <div class="field">
                <label><span class="lbl-icon">🧒</span> Your Name</label>
                <input class="input" id="username" placeholder="Pick a cool username" autocomplete="off" />
              </div>
              <div class="field">
                <label><span class="lbl-icon">🔒</span> Password</label>
                <input class="input" id="password" type="password" placeholder="Secret password" />
              </div>

              ${mode === "signup" ? `
              <div class="avatar-card">
                <div class="avatar-title">🎭 Pick your character!</div>
                <div class="avatar-picker">
                  <button class="arrow-btn" onclick="changeAvatar(-1)">‹</button>
                  <div class="avatar-preview">
                    <div class="avatar-big">${av.icon}</div>
                    <div class="avatar-name">${av.name}</div>
                    <div class="avatar-desc">${av.desc}</div>
                  </div>
                  <button class="arrow-btn" onclick="changeAvatar(1)">›</button>
                </div>
              </div>` : ""}

              <button class="action-btn" onclick="${mode==="signup"?"signup()":"login()"}">
                ${mode==="signup" ? "🚀 Let's Go!" : "🎮 Play Now!"}
              </button>

              <div class="hint">${message}</div>
            </div>
          </div>`;
      }

      function switchMode(newMode) { mode = newMode; showAuth(""); }

      function changeAvatar(dir) {
        avatarIndex = (avatarIndex + dir + avatars.length) % avatars.length;
        showAuth("");
      }

      /* ──────────────────────────────────────────────
         AUTH LOGIC
      ────────────────────────────────────────────── */
      function signup() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        if (username.length < 3) { showAuth("⚠️ Name must be at least 3 letters!"); return; }
        if (password.length < 3) { showAuth("⚠️ Password must be at least 3 letters!"); return; }
        if (localStorage.getItem(getUserKey(username))) { showAuth("⚠️ That name is already taken!"); return; }
        const data = { username, password, avatarIndex, level: 1, stars: 0 };
        localStorage.setItem(getUserKey(username), JSON.stringify(data));
        setCurrentUser(username);
        renderMap();
      }

      function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const user = getUserData(username);
        if (!user)                  { showAuth("⚠️ Account not found. Try signing up!"); return; }
        if (user.password !== password) { showAuth("⚠️ Wrong password. Try again!"); return; }
        setCurrentUser(username);
        renderMap();
      }

      function logout() {
        localStorage.removeItem("currentUser");
        mode = "login";
        showAuth("");
      }

      /* ──────────────────────────────────────────────
         AVATAR EDITOR MODAL
      ────────────────────────────────────────────── */
      function openAvatarEditor() {
        const user = getUserData(getCurrentUser());
        if (!user) return;
        avatarIndex = user.avatarIndex || 0;
        const av = avatars[avatarIndex];
        const modal = document.createElement("div");
        modal.className = "modal-backdrop";
        modal.id = "avatarModal";
        modal.innerHTML = `
          <div class="modal">
            <h3>🎭 Change Character</h3>
            <p>Pick the buddy you want to play with today!</p>
            <div class="avatar-card">
              <div class="avatar-picker">
                <button class="arrow-btn" onclick="modalChangeAvatar(-1)">‹</button>
                <div class="avatar-preview">
                  <div class="avatar-big" id="modalAvatarIcon">${av.icon}</div>
                  <div class="avatar-name" id="modalAvatarName">${av.name}</div>
                  <div class="avatar-desc" id="modalAvatarDesc">${av.desc}</div>
                </div>
                <button class="arrow-btn" onclick="modalChangeAvatar(1)">›</button>
              </div>
            </div>
            <button class="action-btn" onclick="saveAvatarChoice()">✅ Choose this one!</button>
            <button class="secondary-btn close-btn" onclick="closeModal('avatarModal')">← Go Back</button>
          </div>`;
        document.body.appendChild(modal);
      }

      function modalChangeAvatar(dir) {
        avatarIndex = (avatarIndex + dir + avatars.length) % avatars.length;
        const av = avatars[avatarIndex];
        document.getElementById("modalAvatarIcon").textContent = av.icon;
        document.getElementById("modalAvatarName").textContent = av.name;
        document.getElementById("modalAvatarDesc").textContent = av.desc;
      }

      function saveAvatarChoice() {
        const user = getUserData(getCurrentUser());
        if (!user) return;
        user.avatarIndex = avatarIndex;
        saveUserData(getCurrentUser(), user);
        closeModal("avatarModal");
        renderMap();
      }

      function closeModal(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
      }

      /* ──────────────────────────────────────────────
         MAP RENDER
      ────────────────────────────────────────────── */
      function renderMap() {
        const currentUser = getCurrentUser();
        const user = getUserData(currentUser);
        if (!user) { showAuth(""); return; }

        const avatar     = avatars[user.avatarIndex] || avatars[0];
        const totalLevels= 20;
        const currentWorld = Math.ceil(user.level / 10);
        const worldLevel = ((user.level - 1) % 10) + 1;  // 1–10 within world
        const progressPct = (worldLevel - 1) * 10;

        const worldLabel = currentWorld === 1 ? "🌿 World 1 · Green Fields" : "🌙 World 2 · Moon Sky";
        const mapLabel   = currentWorld === 1 ? "🌱 Learning Adventure!"    : "🌙 Moonlight Quest!";

        document.getElementById("app").innerHTML = `
          <div class="topbar">
            <div class="top-left">
              <div class="mini-avatar">${avatar.icon}</div>
              <div class="user-meta">
                <div class="user-name">${user.username}</div>
                <div class="user-sub">
                  🏆 Level ${user.level}
                  &nbsp;·&nbsp;
                  ⭐ ${user.stars || 0} stars
                </div>
              </div>
            </div>
            <div class="top-actions">
              <button class="pill-btn" onclick="openAvatarEditor()">🎭 Character</button>
              <button class="pill-btn" onclick="logout()">👋 Logout</button>
            </div>
          </div>

          <div class="map-wrap">
            <div class="world-card">
              <div>
                <div class="world-title">${worldLabel}</div>
                <div class="world-sub">Complete each level to move up! 🚀</div>
              </div>
              <div class="world-progress">
                <span>${worldLevel}/10</span>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${progressPct}%"></div>
                </div>
                <span>🌟</span>
              </div>
            </div>
            <div class="map world-${currentWorld}" id="map">
              <div class="map-title">${mapLabel}</div>
            </div>
          </div>`;

        const map      = document.getElementById("map");
        const mapWidth = map.clientWidth;
        const center   = mapWidth / 2;

        /* Level positions (wave path) */
        const positions = [];
        const yStart = 1580;
        const stepY  = 120;
        const offsets = [0, 175, -175, 115, -115, 185, -185, 95, -95, 0];
        for (let i = 0; i < totalLevels; i++) {
          positions.push({ x: center + offsets[i % offsets.length], y: yStart - i * stepY });
        }

        /* Decorative bubbles */
        [ {x:65,y:180,s:70}, {x:mapWidth-130,y:320,s:95},
          {x:110,y:680,s:80}, {x:mapWidth-160,y:1060,s:72},
          {x:180,y:1420,s:58} ]
        .forEach(b => {
          const el = document.createElement("div");
          el.className = "bubble";
          Object.assign(el.style, { left:b.x+"px", top:b.y+"px", width:b.s+"px", height:b.s+"px" });
          map.appendChild(el);
        });

        /* Terrain decorations for world 1 */
        if (currentWorld === 1) {
          const decos = [
            {e:"🌸",x:40,  y:450}, {e:"🌺",x:mapWidth-80,y:600},
            {e:"🌻",x:60,  y:900}, {e:"🍀",x:mapWidth-90,y:1100},
            {e:"🌴",x:50,  y:1300},{e:"🌵",x:mapWidth-70,y:1500},
            {e:"🍄",x:100, y:750}, {e:"🦋",x:mapWidth-110,y:850},
          ];
          decos.forEach(d => {
            const el = document.createElement("div");
            el.className = "terrain-deco";
            el.textContent = d.e;
            el.style.left = d.x + "px";
            el.style.top  = d.y + "px";
            map.appendChild(el);
          });
        } else {
          const decos = [
            {e:"⭐",x:40,  y:450}, {e:"💫",x:mapWidth-80,y:580},
            {e:"🌟",x:70,  y:850}, {e:"✨",x:mapWidth-90,y:1050},
            {e:"🪐",x:55,  y:1250},{e:"☄️",x:mapWidth-75,y:1450},
            {e:"🌠",x:110, y:720}, {e:"🔭",x:mapWidth-100,y:930},
          ];
          decos.forEach(d => {
            const el = document.createElement("div");
            el.className = "terrain-deco";
            el.textContent = d.e;
            el.style.left = d.x + "px";
            el.style.top  = d.y + "px";
            map.appendChild(el);
          });
        }

        /* Path connectors */
        for (let i = 0; i < positions.length - 1; i++) {
          const p1 = positions[i], p2 = positions[i+1];
          const dx = p2.x - p1.x, dy = p2.y - p1.y;
          const dist  = Math.sqrt(dx*dx + dy*dy);
          const angle = Math.atan2(dy, dx) * 180 / Math.PI;
          const line  = document.createElement("div");
          line.className = "path-line";
          Object.assign(line.style, {
            width    : dist+"px",
            left     : p1.x+"px",
            top      : p1.y+"px",
            transform: `rotate(${angle}deg)`,
          });
          map.appendChild(line);
        }

        /* Level nodes */
        positions.forEach((pos, idx) => {
          const levelNum = idx + 1;
          const btn   = document.createElement("button");
          btn.className = "level";
          btn.style.left = (pos.x - 42) + "px";
          btn.style.top  = (pos.y - 42) + "px";

          const label = document.createElement("div");
          label.className = "level-label";
          label.textContent = levelNum <= 10 ? "World 1" : "World 2";

          if (levelNum < user.level) {
            btn.classList.add("done");
            btn.innerHTML = `✓`;
            btn.appendChild(label);
            btn.onclick = () => openLevel(levelNum);
          } else if (levelNum === user.level) {
            btn.classList.add("open", "current");
            btn.textContent = levelNum;
            btn.appendChild(label);
            btn.onclick = () => openLevel(levelNum);
          } else {
            btn.classList.add("locked");
            btn.textContent = "🔒";
            btn.appendChild(label);
          }
          map.appendChild(btn);
        });

        /* Player token */
        const player = document.createElement("div");
        player.className = "player";
        player.id = "player";
        player.textContent = avatar.icon;
        map.appendChild(player);

        const curPos = positions[Math.min(Math.max(user.level - 1, 0), positions.length - 1)];
        movePlayerTo(curPos.x, curPos.y);

        /* Smooth scroll to player */
        setTimeout(() => {
          const mapRect = map.getBoundingClientRect();
          const scrollTarget = mapRect.top + window.scrollY + curPos.y - window.innerHeight * 0.55;
          window.scrollTo({ top: Math.max(0, scrollTarget), behavior: "smooth" });
        }, 120);
      }

      /* ──────────────────────────────────────────────
         PLAYER MOVEMENT
      ────────────────────────────────────────────── */
      function movePlayerTo(x, y) {
        const player = document.getElementById("player");
        if (!player) return;
        player.style.left = (x - 38) + "px";
        player.style.top  = (y - 102) + "px";
        player.classList.remove("bounce");
        void player.offsetWidth;          /* reflow to restart anim */
        player.classList.add("bounce");
        setTimeout(() => player.classList.remove("bounce"), 360);
      }

      /* ──────────────────────────────────────────────
         QUIZ MODAL
      ────────────────────────────────────────────── */
      function openLevel(levelNum) {
        const q        = quizData[(levelNum - 1) % quizData.length];
        const shuffled = [...q.options].sort(() => Math.random() - 0.5);

        const modal = document.createElement("div");
        modal.className = "modal-backdrop";
        modal.id = "levelModal";
        modal.innerHTML = `
          <div class="modal">
            <h3>🎯 Level ${levelNum}</h3>
            <p>What does this word mean in Arabic? Pick the right answer! 👇</p>

            <div class="quiz-header">
              <span class="quiz-emoji">${q.emoji}</span>
              <div class="quiz-label">English Word</div>
            </div>
            <div class="quiz-word">${q.word}</div>

            <div class="quiz-instruction">
              🌍 Choose the Arabic meaning below
            </div>

            <div class="options-grid" id="optionsWrap">
              ${shuffled.map(opt => `
                <button class="option-btn"
                  onclick="answerLevel(${levelNum}, '${q.correct.replace(/'/g,"\\'")}', '${opt.replace(/'/g,"\\'")}', this)">
                  ${opt}
                </button>`).join("")}
            </div>

            <button class="secondary-btn close-btn" onclick="closeModal('levelModal')">← Close</button>
          </div>`;
        document.body.appendChild(modal);
      }

      /* ──────────────────────────────────────────────
         ANSWER HANDLER
      ────────────────────────────────────────────── */
      function answerLevel(levelNum, correct, chosen, btnEl) {
        /* Disable all option buttons to prevent double-clicking */
        document.querySelectorAll(".option-btn").forEach(b => b.onclick = null);

        if (chosen !== correct) {
          if (btnEl) btnEl.classList.add("wrong");
          /* Highlight correct answer */
          document.querySelectorAll(".option-btn").forEach(b => {
            if (b.textContent.trim() === correct) b.classList.add("correct");
          });
          setTimeout(() => {
            showPopup("Try again! You can do it! 💪", true);
            closeModal("levelModal");
          }, 700);
          return;
        }

        if (btnEl) btnEl.classList.add("correct");

        setTimeout(() => {
          const currentUser = getCurrentUser();
          const user = getUserData(currentUser);
          if (!user) return;
          const oldWorld = Math.ceil(user.level / 10);

          if (levelNum === user.level) {
            user.level = Math.min(user.level + 1, 20);
            user.stars = (user.stars || 0) + 1;
            saveUserData(currentUser, user);
          }
          const newWorld = Math.ceil(user.level / 10);
          closeModal("levelModal");
          renderMap();

          setTimeout(() => {
            if (newWorld > oldWorld) {
              showWorldTransition(newWorld);
              setTimeout(() => showPopup(`Amazing! 🌙 World ${newWorld} unlocked!`), 900);
            } else if (user.level !== levelNum) {
              showPopup("Awesome! Level cleared! ⭐");
            } else {
              showPopup("Great! You already passed this one! 🌟");
            }
          }, 200);
        }, 600);
      }

      /* ──────────────────────────────────────────────
         BOOT
      ────────────────────────────────────────────── */
      function boot() {
        const cu = getCurrentUser();
        if (cu && getUserData(cu)) { renderMap(); } else { showAuth(""); }
      }
      boot();
    </script>
  </body>
</html>
