<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wordy</title>
<style>
  * {
    box-sizing: border-box;
  }
  :root {
    --bg1: #a8edea;
    --bg2: #fed6e3;
    --card: rgba(255, 255, 255, 0.92);
    --text: #1d2b24;
    --muted: #6b7a72;
    --primary: #4caf7a;
    --primary-dark: #2f8f60;
    --shadow: 0 18px 45px rgba(35, 74, 49, 0.14);
  }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    overflow-x: hidden;
  }
  #app {
    min-height: 100vh;
  }
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .auth-card {
    width: 100%;
    max-width: 430px;
    background: var(--card);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
  }
  .brand {
    text-align: center;
    margin-bottom: 24px;
  }
  .brand-badge {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    border-radius: 20px;
    display: grid;
    place-items: center;
    font-size: 36px;
    font-weight: 900;
    color: #1f5f42;
    background: radial-gradient(
      circle at 30% 30%,
      #ffffff,
      #dff9e8 58%,
      #c8f0d8 100%
    );
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95),
      0 14px 28px rgba(76, 175, 122, 0.18);
    position: relative;
    letter-spacing: 1px;
  }
  .brand-badge::after {
    content: "✨";
    position: absolute;
    right: 8px;
    top: 6px;
    font-size: 16px;
  }
  .brand h1 {
    margin: 0;
    font-size: 38px;
    letter-spacing: 0.5px;
    color: #1f5f42;
  }
  .brand p {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
  }
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    background: #edf8f0;
    padding: 6px;
    border-radius: 16px;
  }
  .tab-btn {
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    background: transparent;
    color: #557363;
    transition: all 0.2s ease;
  }
  .tab-btn.active {
    background: white;
    color: var(--text);
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    color: #4f6659;
    font-weight: bold;
  }
  .input {
    width: 100%;
    border: 1px solid #d6e9db;
    background: #fff;
    border-radius: 15px;
    padding: 14px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input:focus {
    border-color: #95d7af;
    box-shadow: 0 0 0 4px rgba(149, 215, 175, 0.2);
  }
  .avatar-card {
    margin-top: 12px;
    background: linear-gradient(180deg, #f4fff7, #ecfbf2);
    border: 1px solid #dcefe3;
    border-radius: 22px;
    padding: 16px;
  }
  .avatar-title {
    font-size: 14px;
    font-weight: bold;
    color: #547060;
    margin-bottom: 12px;
  }
  .avatar-picker {
    display: grid;
    grid-template-columns: 52px 1fr 52px;
    align-items: center;
    gap: 10px;
  }
  .arrow-btn {
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    font-size: 24px;
    background: white;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    transition: transform 0.15s;
  }
  .arrow-btn:hover {
    transform: translateY(-1px);
  }
  .avatar-preview {
    text-align: center;
    background: white;
    border-radius: 20px;
    padding: 14px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8),
      0 8px 18px rgba(0, 0, 0, 0.06);
  }
  .avatar-big {
    font-size: 66px;
    line-height: 1;
    margin-bottom: 10px;
  }
  .avatar-name {
    font-size: 17px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .avatar-desc {
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
  }
  .action-btn {
    width: 100%;
    border: none;
    border-radius: 16px;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    box-shadow: 0 12px 25px rgba(76, 175, 122, 0.28);
    margin-top: 20px;
    transition: all 0.2s ease;
  }
  .action-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 15px 30px rgba(76, 175, 122, 0.34);
  }
  .secondary-btn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 12px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    background: #edf7f0;
    color: #355646;
    margin-top: 10px;
    transition: all 0.2s ease;
  }
  .secondary-btn:hover {
    background: #e0f0e0;
  }
  .hint {
    margin-top: 12px;
    text-align: center;
    color: #607167;
    font-size: 13px;
    min-height: 18px;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: rgba(255, 255, 255, 0.74);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  }
  .top-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .mini-avatar {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    font-size: 30px;
    background: white;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    flex-shrink: 0;
  }
  .user-meta {
    min-width: 0;
  }
  .user-name {
    font-size: 18px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .user-sub {
    margin-top: 3px;
    color: #6b7a72;
    font-size: 13px;
  }
  .top-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .pill-btn {
    border: none;
    border-radius: 999px;
    padding: 11px 15px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    background: white;
    color: #355646;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
    transition: all 0.2s ease;
  }
  .pill-btn:hover {
    background: #f0f0f0;
  }
  /* Map styles remain same but refined for clarity */
  .map {
    position: relative;
    width: 100%;
    max-width: 920px;
    height: 1800px;
    margin: 0 auto;
    border-radius: 34px;
    overflow: hidden;
    box-shadow: 0 18px 45px rgba(35, 74, 49, 0.14);
    transition: background 0.8s ease, box-shadow 0.8s ease;
  }
  /* Other map styles unchanged for brevity, keep as is with slight refinement if needed */

  /* Level buttons styling improvements */
  .level {
    position: absolute;
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 25px;
    font-weight: bold;
    color: white;
    z-index: 3;
    box-shadow: 0 15px 25px rgba(0, 0, 0, 0.14);
    transition: transform 0.15s, box-shadow 0.15s, background 0.5s ease;
  }
  .level:hover {
    transform: scale(1.05);
  }
  /* Additional styles for current, locked, done states */
  .level.open {
    background: radial-gradient(circle at 30% 30%, #6fd69a, #2e9f68);
  }
  .map.world-2 .level.open {
    background: radial-gradient(circle at 30% 30%, #89b7ff, #4e75df);
  }
  .level.current {
    box-shadow: 0 0 0 7px rgba(255, 255, 255, 0.8),
      0 0 0 14px rgba(111, 214, 154, 0.25), 0 15px 25px rgba(0, 0, 0, 0.14);
  }
  .map.world-2 .level.current {
    box-shadow: 0 0 0 7px rgba(255, 255, 255, 0.7),
      0 0 0 14px rgba(137, 183, 255, 0.25), 0 15px 25px rgba(0, 0, 0, 0.22);
  }
  .level.locked {
    background: linear-gradient(180deg, #d9e3dd, #bcc8c1);
    color: #7a8880;
    cursor: not-allowed;
  }
  .map.world-2 .level.locked {
    background: linear-gradient(180deg, #7e8cb1, #5e6b90);
    color: #d9e3ff;
  }
  .level.done {
    background: radial-gradient(circle at 30% 30%, #4fd18d, #21885a);
  }
  .map.world-2 .level.done {
    background: radial-gradient(circle at 30% 30%, #7bb0ff, #4469cf);
  }
  /* Labels */
  .level-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -24px;
    font-size: 12px;
    font-weight: bold;
    color: #476455;
    white-space: nowrap;
    pointer-events: none;
  }
  .map.world-2 .level-label {
    color: #dce7ff;
  }

  /* Player styles */
  .player {
    position: absolute;
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 42px;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 16px 28px rgba(0, 0, 0, 0.16);
    z-index: 5;
    transition: left 0.55s ease, top 0.55s ease, transform 0.2s ease;
    border: 4px solid rgba(255, 255, 255, 0.95);
  }
  .player.bounce {
    transform: scale(1.08);
  }

  /* Map title styles */
  .map-title {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    background: rgba(255, 255, 255, 0.78);
    padding: 12px 18px;
    border-radius: 999px;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 10px 18px rgba(0, 0, 0, 0.07);
  }
  .map.world-2 .map-title {
    background: rgba(22, 35, 68, 0.55);
    color: #f5f8ff;
  }

  /* Modals and popups styles for consistency */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(22, 36, 28, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 50;
  }
  .modal {
    width: 100%;
    max-width: 430px;
    background: white;
    border-radius: 26px;
    padding: 22px;
    box-shadow: 0 24px 50px rgba(0, 0, 0, 0.24);
  }
  .modal h3 {
    margin: 0 0 8px;
    font-size: 25px;
  }
  .modal p {
    margin: 0 0 16px;
    color: #6b7a72;
    line-height: 1.5;
  }
  /* Quiz word style */
  .quiz-word {
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    margin: 8px 0 18px;
    color: #2b513d;
  }
  .option-btn {
    width: 100%;
    text-align: left;
    border: 1px solid #d5e9db;
    background: #f9fffb;
    color: #274635;
    border-radius: 16px;
    padding: 14px;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .option-btn:hover {
    background: #f1fbf5;
  }

  /* Popup styles */
  .popup {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    min-width: 260px;
    max-width: 90vw;
    padding: 16px 22px;
    border-radius: 18px;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
  }
  .popup.success {
    background: linear-gradient(135deg, #35b36f, #24915a);
  }
  .popup.error {
    background: linear-gradient(135deg, #e35d5d, #bf3f3f);
  }
  .popup.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* World transition overlay styles */
  .world-transition {
    position: fixed;
    inset: 0;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(
      circle at center,
      rgba(255, 255, 255, 0.18),
      rgba(10, 20, 40, 0.88)
    );
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .world-transition.show {
    opacity: 1;
    pointer-events: all;
  }
  .world-transition-card {
    width: min(440px, 92vw);
    padding: 34px 28px;
    border-radius: 30px;
    text-align: center;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.14),
      rgba(255, 255, 255, 0.08)
    );
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    color: white;
    transform: scale(0.92);
    transition: transform 0.5s ease;
  }
  .world-transition.show .world-transition-card {
    transform: scale(1);
  }
  .world-transition-emoji {
    font-size: 56px;
    margin-bottom: 12px;
  }
  .world-transition-title {
    font-size: 34px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .world-transition-text {
    font-size: 17px;
    opacity: 0.95;
  }

  /* Responsive improvements */
  @media(max-width: 700px) {
    .auth-card {
      padding: 22px;
    }
    .map {
      height: 1680px;
      border-radius: 28px;
    }
    .level {
      width: 68px;
      height: 68px;
      font-size: 22px;
    }
    .player {
      width: 64px;
      height: 64px;
      font-size: 38px;
    }
    .world-card {
      padding: 14px;
    }
    .topbar {
      align-items: flex-start;
    }
    .top-actions {
      width: 100%;
      justify-content: flex-start;
    }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="popup" class="popup success">Done</div>
<script>
  // Your JavaScript remains the same
  // (No need to repeat here, just keep your existing script)
</script>
</body>
</html>
