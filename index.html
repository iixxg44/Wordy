<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learn English</title>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  margin: 0;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.card {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.word {
  font-size: 28px;
  font-weight: bold;
}

.meaning {
  color: gray;
  margin-top: 10px;
}

input {
  padding: 10px;
  width: 80%;
  margin-top: 10px;
}

button {
  padding: 10px 20px;
  margin-top: 10px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.score {
  font-size: 18px;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">

<h1>📚 Learn English</h1>

<div class="card">
  <div class="word" id="word">Loading...</div>
  <div class="meaning" id="meaning"></div>
</div>

<div class="card">
  <input id="answer" placeholder="Write the meaning in Arabic">
  <br>
  <button onclick="checkAnswer()">Check</button>
  <button onclick="nextWord()">Next</button>
</div>

<div class="score">
  Score: <span id="score">0</span>
</div>

</div>

<script>

const words = [
  {en: "apple", ar: "تفاح"},
  {en: "book", ar: "كتاب"},
  {en: "car", ar: "سيارة"},
  {en: "house", ar: "بيت"},
  {en: "water", ar: "ماء"},
  {en: "school", ar: "مدرسة"},
  {en: "food", ar: "طعام"}
];

let current;
let score = 0;

function nextWord() {
  current = words[Math.floor(Math.random() * words.length)];

  document.getElementById("word").innerText = current.en;
  document.getElementById("meaning").innerText = "";
  document.getElementById("answer").value = "";
}

function checkAnswer() {
  const answer = document.getElementById("answer").value.trim();

  if (answer === current.ar) {
    alert("✅ Correct!");
    score++;
  } else {
    alert("❌ Wrong! Answer: " + current.ar);
  }

  document.getElementById("score").innerText = score;
}

nextWord();

</script>

</body>
</html>
