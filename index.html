<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wordy - Grades & Worlds</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg1: #dff7ea; --bg2: #f8fff9; --card: rgba(255, 255, 255, 0.92);
            --text: #1d2b24; --muted: #6b7a72; --primary: #4caf7a;
            --primary-dark: #2f8f60; --shadow: 0 18px 45px rgba(35, 74, 49, 0.14);
        }
        body {
            margin: 0; min-height: 100vh; font-family: Arial, sans-serif; color: var(--text);
            background: linear-gradient(180deg, var(--bg1), var(--bg2)); overflow-x: hidden;
        }

        /* Grade Selection Screen */
        .grade-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-top: 20px; }
        .grade-btn { padding: 15px; border-radius: 16px; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .grade-btn:hover { background: var(--primary); color: white; transform: translateY(-3px); }

        /* Auth Styles (Keeping your original look) */
        .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .auth-card { width: 100%; max-width: 430px; background: var(--card); backdrop-filter: blur(10px); border-radius: 28px; padding: 28px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.8); text-align: center; }
        .input { width: 100%; border: 1px solid #d6e9db; border-radius: 15px; padding: 14px; margin-bottom: 12px; outline: none; }
        .action-btn { width: 100%; border: none; border-radius: 16px; padding: 14px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; }

        /* Map & Worlds */
        .map { position: relative; width: 100%; max-width: 920px; height: 3800px; margin: 0 auto; border-radius: 34px; overflow: hidden; box-shadow: var(--shadow); transition: 0.8s; }
        
        /* World 1: Green Forest */
        .map.world-1 { background: linear-gradient(180deg, #d8f5df, #bce7c6); }
        .map.world-1::before { content: "🌳☁️🌳"; position: absolute; top: 50px; left: 10%; font-size: 40px; opacity: 0.4; }

        /* World 2: Night Sky */
        .map.world-2 { background: linear-gradient(180deg, #182647, #314d84); }
        .map.world-2::after { content: "🌙⭐"; position: absolute; top: 40px; right: 40px; font-size: 50px; }

        /* World 3: Treasure Island */
        .map.world-3 { background: linear-gradient(135deg, #f1c40f, #e67e22); }
        .map.world-3::before { content: "💰💎🪙"; position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-size: 50px; }

        /* Path & Levels */
        .path-line { position: absolute; height: 8px; border-radius: 999px; transform-origin: left center; z-index: 1; background: rgba(255,255,255,0.3); }
        .level { position: absolute; width: 75px; height: 75px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; color: white; z-index: 3; box-shadow: 0 10px 20px rgba(0,0,0,0.15); transition: 0.2s; }
        .level.locked { background: #ccc; cursor: not-allowed; }
        .level.open { background: #4caf7a; border: 4px solid white; }
        .level.done { background: #2f8f60; }
        
        .player { position: absolute; width: 65px; height: 65px; border-radius: 50%; display: grid; place-items: center; font-size: 38px; background: white; z-index: 5; transition: 0.5s ease; border: 3px solid #ffcc00; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        
        .topbar { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid #ddd; }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    const avatars = ["🦊", "🐼", "🐯", "🐵", "🦁", "🐰", "🐸", "🐻"];
    const totalLevels = 30;

    function getCurrentUser() { return localStorage.getItem("currentUser"); }
    function getUserData(name) { return JSON.parse(localStorage.getItem("user_" + name.toLowerCase())); }
    function saveUserData(name, data) { localStorage.setItem("user_" + name.toLowerCase(), JSON.stringify(data)); }

    // --- Views ---

    function showAuth() {
        document.getElementById("app").innerHTML = `
            <div class="auth-wrap">
                <div class="auth-card">
                    <h2>Welcome to Wordy</h2>
                    <input class="input" id="username" placeholder="Username">
                    <input class="input" id="password" type="password" placeholder="Password">
                    <button class="action-btn" onclick="handleAuth()">Login / Sign Up</button>
                </div>
            </div>`;
    }

    function handleAuth() {
        const name = document.getElementById("username").value.trim();
        if (!name) return alert("Please enter a name");
        
        let data = getUserData(name);
        if (!data) {
            data = { username: name, grade: null, level: 1, avatar: avatars[0], stars: 0 };
            saveUserData(name, data);
        }
        localStorage.setItem("currentUser", name);
        
        if (!data.grade) showGradeSelection();
        else renderMap();
    }

    function showGradeSelection() {
        let gradesHTML = "";
        for (let i = 3; i <= 12; i++) {
            gradesHTML += `<button class="grade-btn" onclick="selectGrade(${i})">Grade ${i}</button>`;
        }
        document.getElementById("app").innerHTML = `
            <div class="auth-wrap">
                <div class="auth-card">
                    <h3>Select Your Grade</h3>
                    <p>Choose your level to start your journey</p>
                    <div class="grade-container">${gradesHTML}</div>
                </div>
            </div>`;
    }

    function selectGrade(g) {
        const name = getCurrentUser();
        const data = getUserData(name);
        data.grade = g;
        saveUserData(name, data);
        renderMap();
    }

    function renderMap() {
        const name = getCurrentUser();
        const data = getUserData(name);
        if (!data) return showAuth();

        const world = data.level <= 10 ? 1 : (data.level <= 20 ? 2 : 3);
        const worldName = world === 1 ? "Green Forest" : (world === 2 ? "Night Sky" : "Treasure Island");

        document.getElementById("app").innerHTML = `
            <div class="topbar">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="font-size:30px; background:white; padding:5px; border-radius:10px;">${data.avatar}</div>
                    <div><b>${data.username}</b><br><small>Grade ${data.grade} | Level ${data.level}</small></div>
                </div>
                <button onclick="logout()" style="padding:8px 15px; border-radius:10px; border:1px solid #ddd; cursor:pointer;">Logout</button>
            </div>
            <div style="padding:20px; text-align:center;">
                <h2 style="margin:0;">World ${world}: ${worldName}</h2>
                <p style="color:#666;">Level ${data.level} of 30</p>
                <div class="map world-${world}" id="map"></div>
            </div>`;

        drawMap(data);
    }

    function drawMap(data) {
        const map = document.getElementById("map");
        const positions = [];
        const mapWidth = map.clientWidth;
        
        // Generate zigzag positions for 30 levels
        for (let i = 0; i < totalLevels; i++) {
            positions.push({
                x: (mapWidth/2 - 40) + Math.sin(i * 0.7) * (mapWidth/3),
                y: 3650 - (i * 120)
            });
        }

        // Draw path lines
        for (let i = 0; i < positions.length - 1; i++) {
            const p1 = positions[i], p2 = positions[i+1];
            const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
            const line = document.createElement("div");
            line.className = "path-line";
            line.style.width = dist + "px";
            line.style.left = p1.x + 37 + "px";
            line.style.top = p1.y + 37 + "px";
            line.style.transform = `rotate(${angle}deg)`;
            map.appendChild(line);
        }

        // Draw level buttons
        positions.forEach((pos, i) => {
            const num = i + 1;
            const btn = document.createElement("button");
            btn.className = `level ${num < data.level ? 'done' : (num === data.level ? 'open' : 'locked')}`;
            btn.style.left = pos.x + "px";
            btn.style.top = pos.y + "px";
            btn.innerHTML = num > data.level ? "🔒" : num;
            if (num <= data.level) btn.onclick = () => playLevel(num);
            map.appendChild(btn);
        });

        // Player marker
        const player = document.createElement("div");
        player.className = "player";
        player.innerHTML = data.avatar;
        const curPos = positions[data.level - 1];
        player.style.left = curPos.x + 5 + "px";
        player.style.top = curPos.y - 45 + "px";
        map.appendChild(player);

        // Auto-scroll to current level
        window.scrollTo({ top: curPos.y - 300, behavior: "smooth" });
    }

    function playLevel(n) {
        const modal = document.createElement("div");
        modal.className = "modal-backdrop";
        modal.innerHTML = `
            <div class="modal">
                <h2>Level ${n}</h2>
                <p>Ready to start the challenge?</p>
                <button class="action-btn" onclick="completeLevel(${n})">Click to Win!</button>
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top:10px; background:none; border:none; color:red; cursor:pointer;">Cancel</button>
            </div>`;
        document.body.appendChild(modal);
    }

    function completeLevel(n) {
        const name = getCurrentUser();
        const data = getUserData(name);
        if (n === data.level && data.level < totalLevels) {
            data.level++;
            saveUserData(name, data);
        }
        document.querySelector(".modal-backdrop").remove();
        renderMap();
    }

    function logout() {
        localStorage.removeItem("currentUser");
        showAuth();
    }

    // Start App
    const user = getCurrentUser();
    if (user) {
        const data = getUserData(user);
        if (data && data.grade) renderMap();
        else if (data) showGradeSelection();
        else showAuth();
    } else {
        showAuth();
    }
</script>
</body>
</html>
