<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lexora</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#7ed957, #4caf50);
  height: 200vh;
  font-family: Arial;
}

.map {
  position: relative;
  width: 100%;
  height: 1500px;
}

/* شكل المرحلة */
.level {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #111;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
}

.locked {
  background: gray;
  cursor: not-allowed;
}

/* الخط */
.path {
  position: absolute;
  width: 4px;
  background: rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div class="map" id="map"></div>

<script>

let unlocked = parseInt(localStorage.getItem("unlocked")) || 1;

const map = document.getElementById("map");

/* أماكن المراحل (نحددها يدويًا) */
const positions = [
  {x: 160, y: 1300},
  {x: 80, y: 1200},
  {x: 200, y: 1150},
  {x: 120, y: 1050},
  {x: 250, y: 1000},
  {x: 200, y: 900},
  {x: 80, y: 850},
  {x: 150, y: 750},
  {x: 250, y: 700},
  {x: 200, y: 600},
  {x: 100, y: 550},
  {x: 150, y: 450},
  {x: 80, y: 400},
  {x: 250, y: 350},
  {x: 200, y: 250}
];

positions.forEach((pos, i) => {
  const div = document.createElement("div");

  div.className = "level";
  div.innerText = i + 1;

  div.style.left = pos.x + "px";
  div.style.top = pos.y + "px";

  if (i + 1 > unlocked) {
    div.classList.add("locked");
  } else {
    div.onclick = () => startLevel(i + 1);
  }

  map.appendChild(div);
});

function startLevel(level) {
  alert("Level " + level);

  if (level === unlocked) {
    unlocked++;
    localStorage.setItem("unlocked", unlocked);
    location.reload();
  }
}

</script>

</body>
</html>
