<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordy – English Made Fun! 🌟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;}
:root{
  --bg1:#fff9e6;--bg2:#fff0f8;--card:rgba(255,255,255,0.97);
  --text:#2a1a4a;--muted:#7a6a8a;--primary:#ff6b6b;--primary-dark:#e84f4f;
  --green:#3ecf8e;--green-dark:#28a870;--blue:#4d9de0;--yellow:#ffd166;
  --purple:#9b5de5;--gold:#f5a623;
  --shadow:0 18px 45px rgba(100,50,150,0.13);--radius:28px;
  --font:'Nunito',Arial,sans-serif;
}
body{margin:0;min-height:100vh;font-family:var(--font);color:var(--text);
  background:radial-gradient(circle at 10% 10%,#ffe8f0 0%,transparent 35%),
  radial-gradient(circle at 90% 5%,#e8f4ff 0%,transparent 30%),
  radial-gradient(circle at 50% 90%,#efffef 0%,transparent 40%),
  linear-gradient(160deg,#fff9e6 0%,#fff0f8 50%,#eef6ff 100%);overflow-x:hidden;}
body::before{content:"⭐ 🌈 ✨ 🌟 💫 ⭐ 🌈";position:fixed;top:-10px;left:0;width:100%;
  font-size:22px;letter-spacing:80px;opacity:0.18;pointer-events:none;
  animation:drift 18s linear infinite;z-index:0;}
@keyframes drift{from{transform:translateX(-80px);}to{transform:translateX(80px);}}
#app{min-height:100vh;position:relative;z-index:1;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 18px;}
.auth-card{width:100%;max-width:460px;background:var(--card);border-radius:36px;padding:36px 32px;
  box-shadow:var(--shadow),0 0 0 4px rgba(255,107,107,0.07);border:2.5px solid rgba(255,255,255,0.95);
  position:relative;overflow:hidden;}
.auth-card::before{content:"";position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle,#ffe8f0 0%,transparent 70%);pointer-events:none;}
.brand{text-align:center;margin-bottom:28px;}
.brand-badge{width:96px;height:96px;margin:0 auto 16px;border-radius:30px;display:grid;place-items:center;
  font-size:40px;font-weight:900;color:white;
  background:linear-gradient(135deg,#ff6b6b,#ff9b42);
  box-shadow:0 12px 30px rgba(255,107,107,0.35),inset 0 1px 0 rgba(255,255,255,0.4);
  position:relative;animation:badge-wobble 3s ease-in-out infinite;}
@keyframes badge-wobble{0%,100%{transform:rotate(-2deg) scale(1);}50%{transform:rotate(2deg) scale(1.04);}}
.brand-badge::after{content:"✨";position:absolute;right:6px;top:4px;font-size:18px;animation:spin-star 4s linear infinite;}
@keyframes spin-star{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.2);}100%{transform:rotate(360deg) scale(1);}}
.brand h1{margin:0;font-size:44px;font-weight:900;
  background:linear-gradient(135deg,#ff6b6b 0%,#ff9b42 50%,#ffd166 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;}
.brand p{margin:6px 0 0;color:var(--muted);font-size:17px;font-weight:700;}
.brand-stars{margin-top:8px;font-size:22px;letter-spacing:4px;}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;
  background:#f5f0ff;padding:6px;border-radius:20px;}
.tab-btn{border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;
  background:transparent;color:#9b80c0;transition:0.2s;font-family:var(--font);}
.tab-btn.active{background:white;color:var(--purple);box-shadow:0 6px 16px rgba(155,93,229,0.15);}
.field{margin-bottom:16px;}
.field label{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:15px;color:var(--text);font-weight:800;}
.field label .lbl-icon{font-size:18px;}
.input{width:100%;border:2.5px solid #e8e0f5;background:#faf8ff;border-radius:16px;padding:16px 18px;
  font-size:16px;font-weight:700;outline:none;transition:0.2s;font-family:var(--font);color:var(--text);}
.input::placeholder{color:#c0b8d0;font-weight:600;}
.input:focus{border-color:var(--purple);background:#fff;box-shadow:0 0 0 4px rgba(155,93,229,0.12);}
.input:focus-visible{animation:input-pulse 0.3s ease;}
@keyframes input-pulse{0%,100%{box-shadow:0 0 0 4px rgba(155,93,229,0.12);}50%{box-shadow:0 0 0 6px rgba(155,93,229,0.25);}}
.avatar-card{margin-top:6px;background:linear-gradient(135deg,#fff8e6,#fff0f8);
  border:2.5px solid #fde0cc;border-radius:26px;padding:20px;}
.avatar-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:14px;text-align:center;}
.avatar-picker{display:grid;grid-template-columns:60px 1fr 60px;align-items:center;gap:10px;}
.arrow-btn{width:60px;height:60px;border:none;border-radius:18px;cursor:pointer;font-size:28px;
  background:white;box-shadow:0 6px 18px rgba(0,0,0,0.09);transition:transform 0.15s,box-shadow 0.15s;font-family:var(--font);}
.arrow-btn:hover{transform:scale(1.08);box-shadow:0 10px 22px rgba(0,0,0,0.14);}
.arrow-btn:active{transform:scale(0.95);}
.arrow-btn{animation:btn-pulse 2s ease-in-out infinite;}
@keyframes btn-pulse{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,0.09);}50%{box-shadow:0 6px 25px rgba(155,93,229,0.25);}}
.avatar-preview{text-align:center;background:white;border-radius:22px;padding:18px 12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.07);border:2px solid #f5e8ff;}
.avatar-big{font-size:70px;line-height:1;margin-bottom:10px;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.14));animation:avatar-bounce 2s ease-in-out infinite;}
@keyframes avatar-bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.avatar-name{font-size:18px;font-weight:900;color:var(--text);margin-bottom:4px;}
.avatar-desc{font-size:13px;color:var(--muted);font-weight:600;min-height:18px;}
.action-btn{width:100%;border:none;border-radius:20px;padding:18px;font-size:18px;font-weight:900;
  cursor:pointer;background:linear-gradient(135deg,#ff6b6b,#ff9b42);color:white;
  box-shadow:0 10px 28px rgba(255,107,107,0.35);margin-top:18px;
  transition:transform 0.15s,box-shadow 0.15s;font-family:var(--font);letter-spacing:0.5px;}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(255,107,107,0.42);}
.action-btn:active{transform:translateY(1px);}
.action-btn{animation:btn-glow 2s ease-in-out infinite;}
@keyframes btn-glow{0%,100%{box-shadow:0 10px 28px rgba(255,107,107,0.35);}50%{box-shadow:0 10px 35px rgba(255,107,107,0.55),0 0 20px rgba(255,107,107,0.2);}}
.secondary-btn{width:100%;border:2.5px solid #e8e0f5;border-radius:16px;padding:14px;font-size:16px;
  font-weight:800;cursor:pointer;background:white;color:var(--purple);margin-top:10px;
  transition:0.15s;font-family:var(--font);}
.secondary-btn:hover{background:#f5f0ff;}
.hint{margin-top:14px;text-align:center;color:#e85d5d;font-size:14px;font-weight:700;min-height:20px;animation:shake-in 0.3s ease;}
@keyframes shake-in{0%{transform:translateX(-4px);}25%{transform:translateX(4px);}50%{transform:translateX(-2px);}100%{transform:translateX(0);}}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:14px 20px;background:rgba(255,255,255,0.88);backdrop-filter:blur(14px);
  border-bottom:2px solid rgba(155,93,229,0.08);box-shadow:0 4px 20px rgba(155,93,229,0.07);}
.top-left{display:flex;align-items:center;gap:14px;min-width:0;}
.mini-avatar{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:32px;
  background:linear-gradient(135deg,#fff5e6,#fff0f8);box-shadow:0 6px 18px rgba(0,0,0,0.1);
  border:2.5px solid #ffe4cc;flex-shrink:0;animation:mini-avatar-float 3s ease-in-out infinite;}
@keyframes mini-avatar-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.user-meta{min-width:0;}
.user-name{font-size:18px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.user-sub{margin-top:2px;color:var(--muted);font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;}
.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.pill-btn{border:none;border-radius:999px;padding:11px 18px;font-size:14px;font-weight:800;cursor:pointer;
  background:white;color:var(--purple);box-shadow:0 6px 16px rgba(155,93,229,0.12);
  border:2px solid #ede0ff;transition:0.15s;font-family:var(--font);}
.pill-btn:hover{background:#f5f0ff;transform:translateY(-1px);}

/* LEVEL SELECT SCREEN */
.level-select-wrap{padding:24px 16px 60px;max-width:960px;margin:0 auto;}
.level-select-title{text-align:center;font-size:28px;font-weight:900;color:var(--text);margin-bottom:8px;}
.level-select-sub{text-align:center;color:var(--muted);font-size:16px;font-weight:700;margin-bottom:32px;}
.levels-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}
.level-card{background:white;border-radius:28px;padding:24px;box-shadow:var(--shadow);
  border:2.5px solid rgba(155,93,229,0.1);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;
  position:relative;overflow:hidden;}
.level-card:hover:not(.locked-card){transform:translateY(-4px);box-shadow:0 28px 55px rgba(100,50,150,0.18);}
.level-card:hover:not(.locked-card) .level-card-badge{transform:scale(1.08) rotate(3deg);}
.level-card-badge{transition:transform 0.3s;}
.level-card.locked-card{opacity:0.65;cursor:not-allowed;filter:grayscale(0.3);}
.level-card-badge{width:72px;height:72px;border-radius:22px;display:grid;place-items:center;
  font-size:32px;font-weight:900;color:white;margin-bottom:14px;}
.level-card-title{font-size:26px;font-weight:900;color:var(--text);margin-bottom:6px;}
.level-card-desc{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:14px;line-height:1.5;}
.level-card-progress{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--muted);}
.lc-progress-bar{flex:1;height:10px;background:#f0e8ff;border-radius:999px;overflow:hidden;}
.lc-progress-fill{height:100%;border-radius:999px;transition:width 0.5s ease;}
.level-card-lock{position:absolute;top:20px;right:20px;font-size:28px;opacity:0.5;}
.level-card-done{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#3ecf8e,#28a870);display:grid;place-items:center;color:white;font-size:16px;font-weight:900;}
.worlds-row{display:flex;gap:8px;margin-top:10px;}
.world-pip{width:28px;height:28px;border-radius:999px;display:grid;place-items:center;font-size:14px;font-weight:900;color:white;}

/* MAP */
.map-wrap{padding:16px 16px 60px;}
.world-card{max-width:940px;margin:0 auto 18px;background:white;border-radius:26px;padding:18px 22px;
  box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;
  gap:14px;flex-wrap:wrap;border:2.5px solid rgba(155,93,229,0.08);}
.world-title{font-size:22px;font-weight:900;color:var(--text);}
.world-sub{color:var(--muted);font-size:14px;margin-top:5px;font-weight:700;}
.world-progress{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--muted);}
.progress-bar{width:110px;height:12px;background:#f0e8ff;border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;transition:width 0.5s ease;}

/* MAP CANVAS */
.map{position:relative;width:100%;max-width:940px;height:1400px;margin:0 auto;border-radius:36px;
  overflow:hidden;box-shadow:0 20px 50px rgba(100,50,150,0.16);transition:background 0.8s ease,box-shadow 0.8s ease;}

/* NATURE world */
.map.world-nature{
  background:radial-gradient(circle at 15% 5%,rgba(255,255,220,0.7) 0%,transparent 20%),
  radial-gradient(circle at 85% 8%,rgba(255,255,200,0.5) 0%,transparent 18%),
  linear-gradient(180deg,#87e8ff 0%,#b0f0ff 7%,#c8f7d0 7%,#c8f7d0 15%,#a8f0b8 15%,#a8f0b8 32%,#c0f5c8 32%,#c0f5c8 50%,#a8f0b8 50%,#a8f0b8 68%,#b8f2c4 68%,#b8f2c4 85%,#a0ecb4 85%,#a0ecb4 100%);
  box-shadow:0 20px 50px rgba(50,150,80,0.15);}
.map.world-nature::before{content:"☀️";position:absolute;top:18px;right:26px;font-size:52px;
  filter:drop-shadow(0 4px 12px rgba(255,200,0,0.5));animation:sun-spin 14s linear infinite;z-index:2;pointer-events:none;}
@keyframes sun-spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.map.world-nature::after{content:"☁️     ☁️";position:absolute;top:28px;left:14px;font-size:36px;
  opacity:0.85;animation:cloud-float 12s ease-in-out infinite;z-index:2;pointer-events:none;letter-spacing:60px;}
@keyframes cloud-float{0%,100%{transform:translateX(0);}50%{transform:translateX(24px);}}

/* SPACE world */
.map.world-space{
  background:radial-gradient(circle at 20% 6%,rgba(255,255,150,0.22) 0%,transparent 14%),
  radial-gradient(circle at 75% 10%,rgba(200,180,255,0.18) 0%,transparent 12%),
  linear-gradient(180deg,#0d1b3e 0%,#1a2d5a 20%,#24407a 45%,#1e3568 70%,#162850 100%);
  box-shadow:0 20px 50px rgba(10,20,60,0.38);}
.map.world-space::before{content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 10% 6%,rgba(255,255,200,0.9) 0 2px,transparent 3px),
  radial-gradient(circle at 26% 3%,rgba(255,255,210,0.8) 0 1.5px,transparent 2.5px),
  radial-gradient(circle at 44% 8%,rgba(255,255,220,0.9) 0 2px,transparent 3px),
  radial-gradient(circle at 60% 4%,rgba(255,255,200,0.8) 0 1.5px,transparent 2.5px),
  radial-gradient(circle at 76% 9%,rgba(255,255,210,0.9) 0 2px,transparent 3px),
  radial-gradient(circle at 90% 3%,rgba(255,255,200,0.8) 0 1.5px,transparent 2.5px),
  radial-gradient(circle at 33% 15%,rgba(255,255,230,0.85) 0 1.5px,transparent 2.5px),
  radial-gradient(circle at 55% 18%,rgba(255,255,220,0.8) 0 2px,transparent 3px),
  radial-gradient(circle at 80% 20%,rgba(255,255,210,0.85) 0 1.5px,transparent 2.5px);
  pointer-events:none;z-index:1;}
.map.world-space::after{content:"🌙";position:absolute;top:24px;right:28px;font-size:50px;opacity:0.95;
  animation:moon-glow 3s ease-in-out infinite alternate;z-index:2;pointer-events:none;}
@keyframes moon-glow{from{filter:drop-shadow(0 0 6px rgba(200,180,255,0.5));}to{filter:drop-shadow(0 0 20px rgba(200,180,255,0.9));}}

/* GOLD world */
.map.world-gold{
  background:radial-gradient(circle at 15% 5%,rgba(255,240,180,0.9) 0%,transparent 25%),
  radial-gradient(circle at 85% 10%,rgba(255,220,100,0.6) 0%,transparent 22%),
  linear-gradient(180deg,#ffeaa0 0%,#ffdb6b 8%,#f5c518 8%,#f5c518 20%,#e8b400 20%,#e8b400 38%,#f0bc10 38%,#f0bc10 56%,#e0a800 56%,#e0a800 75%,#c89600 75%,#c89600 100%);
  box-shadow:0 20px 50px rgba(180,120,0,0.28);}
.map.world-gold::before{content:"💰";position:absolute;top:22px;right:28px;font-size:50px;
  filter:drop-shadow(0 4px 14px rgba(255,200,0,0.7));animation:coin-spin 4s ease-in-out infinite;z-index:2;pointer-events:none;}
@keyframes coin-spin{0%,100%{transform:scale(1) rotate(-5deg);}50%{transform:scale(1.12) rotate(5deg);}}
.map.world-gold::after{content:"✨   ✨   ✨";position:absolute;top:30px;left:14px;font-size:24px;opacity:0.8;
  animation:shimmer 3s ease-in-out infinite;z-index:2;pointer-events:none;letter-spacing:28px;}
@keyframes shimmer{0%,100%{opacity:0.5;}50%{opacity:1;}}

/* PATH */
.path-line{position:absolute;height:10px;border-radius:999px;transform-origin:left center;z-index:1;transition:background 0.6s ease;}
.map.world-nature .path-line{background:repeating-linear-gradient(90deg,rgba(255,255,255,0.7) 0 18px,transparent 18px 30px);}
.map.world-space .path-line{background:repeating-linear-gradient(90deg,rgba(180,210,255,0.55) 0 18px,transparent 18px 30px);}
.map.world-gold .path-line{background:repeating-linear-gradient(90deg,rgba(255,255,255,0.6) 0 18px,transparent 18px 30px);}

/* LEVELS */
.level{position:absolute;width:84px;height:84px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;
  color:white;z-index:3;box-shadow:0 10px 24px rgba(0,0,0,0.15);
  transition:transform 0.18s,box-shadow 0.18s,background 0.5s;font-family:var(--font);}
.level:hover{transform:scale(1.1);box-shadow:0 16px 30px rgba(0,0,0,0.22);}
.level:active{transform:scale(0.96);}
.level.open{background:radial-gradient(circle at 30% 30%,#6fe49a,#28a870);}
.level.open:hover{background:radial-gradient(circle at 30% 30%,#86ffb2,#30c880);}
.map.world-space .level.open{background:radial-gradient(circle at 30% 30%,#91c4ff,#4a78e8);}
.map.world-gold .level.open{background:radial-gradient(circle at 30% 30%,#ffe55a,#c8900a);}
.level.current{box-shadow:0 0 0 6px rgba(255,255,255,0.9),0 0 0 13px rgba(111,228,154,0.35),0 12px 26px rgba(0,0,0,0.16);animation:current-pulse 2s ease-in-out infinite;}
@keyframes current-pulse{0%,100%{box-shadow:0 0 0 6px rgba(255,255,255,0.9),0 0 0 13px rgba(111,228,154,0.30),0 12px 26px rgba(0,0,0,0.16);}50%{box-shadow:0 0 0 6px rgba(255,255,255,0.9),0 0 0 20px rgba(111,228,154,0.15),0 12px 26px rgba(0,0,0,0.16);}}
.map.world-space .level.current{animation:current-pulse-night 2s ease-in-out infinite;}
@keyframes current-pulse-night{0%,100%{box-shadow:0 0 0 6px rgba(255,255,255,0.8),0 0 0 13px rgba(145,196,255,0.30),0 12px 26px rgba(0,0,0,0.22);}50%{box-shadow:0 0 0 6px rgba(255,255,255,0.8),0 0 0 22px rgba(145,196,255,0.12),0 12px 26px rgba(0,0,0,0.22);}}
.map.world-gold .level.current{animation:current-pulse-gold 2s ease-in-out infinite;}
@keyframes current-pulse-gold{0%,100%{box-shadow:0 0 0 6px rgba(255,255,255,0.9),0 0 0 13px rgba(245,200,30,0.45),0 12px 26px rgba(0,0,0,0.18);}50%{box-shadow:0 0 0 6px rgba(255,255,255,0.9),0 0 0 22px rgba(245,200,30,0.18),0 12px 26px rgba(0,0,0,0.18);}}
.level.locked{background:linear-gradient(180deg,#e0d8f0,#c8c0dc);color:#a898c0;cursor:not-allowed;box-shadow:0 6px 14px rgba(0,0,0,0.1);}
.level.locked:hover{transform:scale(1.03);}
.map.world-space .level.locked{background:linear-gradient(180deg,#3a4d7a,#28395e);color:#8898c8;}
.map.world-gold .level.locked{background:linear-gradient(180deg,#c8a840,#a07820);color:#ffe8a0;}
.level.done{background:radial-gradient(circle at 30% 30%,#4fd190,#21885a);font-size:22px;}
.map.world-space .level.done{background:radial-gradient(circle at 30% 30%,#7bb4ff,#3f6acc);}
.map.world-gold .level.done{background:radial-gradient(circle at 30% 30%,#ffe44a,#c07800);color:#3a2000;}
.level-label{position:absolute;left:50%;transform:translateX(-50%);bottom:-26px;font-size:11px;font-weight:800;
  white-space:nowrap;pointer-events:none;padding:2px 8px;border-radius:999px;
  background:rgba(255,255,255,0.75);color:#5a4a7a;}
.map.world-space .level-label{background:rgba(20,35,80,0.55);color:#c8d8ff;}
.map.world-gold .level-label{background:rgba(80,50,0,0.55);color:#ffe8a0;}

/* PLAYER */
.player{position:absolute;width:76px;height:76px;border-radius:50%;display:grid;place-items:center;font-size:44px;
  background:rgba(255,255,255,0.97);box-shadow:0 14px 28px rgba(0,0,0,0.18),0 0 0 4px rgba(255,255,255,0.9);
  z-index:5;transition:left 0.55s cubic-bezier(.34,1.56,.64,1),top 0.55s cubic-bezier(.34,1.56,.64,1);
  border:3px solid rgba(255,255,255,0.95);}
.player.bounce{animation:player-bounce 0.35s ease;}
@keyframes player-bounce{0%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(0.94);}100%{transform:scale(1);}}

/* MAP TITLE */
.map-title{position:absolute;top:100px;left:50%;transform:translateX(-50%);z-index:4;
  background:rgba(255,255,255,0.92);padding:14px 24px;border-radius:999px;font-size:18px;font-weight:900;

.map.world-gold .map-title{background:rgba(100,60,0,0.75);color:#ffe88a;border-color:rgba(255,220,80,0.3);}

.bubble{position:absolute;border-radius:50%;filter:blur(2px);z-index:0;transition:background 0.6s ease;}
.map.world-nature .bubble{background:rgba(255,255,255,0.25);}
.map.world-space .bubble{background:rgba(160,200,255,0.12);}
.map.world-gold .bubble{background:rgba(255,240,100,0.2);}
.terrain-deco{position:absolute;font-size:26px;z-index:2;pointer-events:none;opacity:0.85;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(20,10,40,0.45);display:flex;align-items:center;
  justify-content:center;padding:20px;z-index:50;backdrop-filter:blur(4px);animation:modal-in 0.25s ease;}
@keyframes modal-in{from{opacity:0;}to{opacity:1;}}
.modal{width:100%;max-width:480px;background:white;border-radius:32px;padding:30px 26px;
  box-shadow:0 28px 60px rgba(0,0,0,0.28);animation:modal-slide 0.3s cubic-bezier(.34,1.56,.64,1);
  border:2.5px solid rgba(155,93,229,0.1);max-height:90vh;overflow-y:auto;}
@keyframes modal-slide{from{transform:translateY(30px) scale(0.95);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
.modal h3{margin:0 0 6px;font-size:26px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;}
.modal p{margin:0 0 18px;color:var(--muted);font-size:16px;font-weight:700;line-height:1.6;}

.quiz-header{text-align:center;margin-bottom:14px;}
.quiz-emoji{font-size:48px;display:block;margin-bottom:4px;animation:quiz-emoji-pop 0.5s cubic-bezier(.34,1.56,.64,1);}
@keyframes quiz-emoji-pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
.quiz-label{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.quiz-question{font-size:20px;font-weight:900;text-align:center;margin:0 0 18px;color:var(--text);

  border:2px solid #f0e0ff;line-height:1.5;}
.quiz-word{font-size:40px;font-weight:900;text-align:center;margin:0 0 22px;color:var(--text);

.quiz-instruction{text-align:center;font-size:15px;font-weight:700;color:var(--muted);margin-bottom:16px;

.options-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:8px;}
.option-btn{width:100%;text-align:center;border:2.5px solid #e8e0f5;background:#faf8ff;color:var(--text);

.dot{width:16px;height:16px;border-radius:50%;background:#e8e0f5;transition:0.3s;}
.dot.done-dot{background:var(--green);}
.dot.current-dot{background:var(--purple);}

/* POPUP */
.popup{position:fixed;top:28px;left:50%;transform:translateX(-50%) translateY(-24px);

.popup.success{background:linear-gradient(135deg,#3ecf8e,#28a870);}
.popup.error{background:linear-gradient(135deg,#ff6b6b,#e84f4f);}
.popup.show{opacity:1;transform:translateX(-50%) translateY(0);}

.world-transition{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;

.world-transition.show{opacity:1;pointer-events:all;}
.world-transition-card{width:min(460px,92vw);padding:42px 32px;border-radius:36px;text-align:center;

.world-transition.show .world-transition-card{transform:scale(1);}
.world-transition-emoji{font-size:72px;margin-bottom:14px;animation:pop-in 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s both;}

.world-transition-title{font-size:36px;font-weight:900;margin-bottom:10px;line-height:1.1;}
.world-transition-text{font-size:18px;opacity:0.9;font-weight:700;}
.world-transition-stars{margin-top:16px;font-size:28px;letter-spacing:6px;animation:stars-appear 0.8s ease 0.4s both;}
@keyframes stars-appear{from{opacity:0;transform:scale(0.5);}to{opacity:1;transform:scale(1);}}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;border:2.5px solid #e8e0f5;
  border-radius:999px;padding:10px 18px;font-size:15px;font-weight:800;color:var(--purple);
  cursor:pointer;transition:0.15s;font-family:var(--font);margin:16px 0 0 16px;}
.back-btn:hover{background:#f5f0ff;transform:translateX(-2px);}

/* FADE IN ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-in-up{animation:fadeInUp 0.5s ease forwards;}
.fade-in-delay-1{animation:fadeInUp 0.5s ease 0.1s forwards;opacity:0;}
.fade-in-delay-2{animation:fadeInUp 0.5s ease 0.2s forwards;opacity:0;}
.fade-in-delay-3{animation:fadeInUp 0.5s ease 0.3s forwards;opacity:0;}

@keyframes slideInLeft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
.slide-in{animation:slideInLeft 0.4s ease forwards;}

@keyframes scaleIn{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
.scale-in{animation:scaleIn 0.4s ease forwards;}

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.float{animation:float 3s ease-in-out infinite;}

@media(max-width:700px){

  .option-btn{font-size:16px;padding:12px;}
  .levels-grid{grid-template-columns:1fr;}
}
