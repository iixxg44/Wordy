<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lexora</title>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #7ed957, #3fa34d);
  font-family: Arial;
  overflow-x: hidden;
}

.map {
  position: relative;
  width: 100%;
  height: 1800px;
}

/* المرحلة */
.level {
  position: absolute;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: #111;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: 0.2s;
}

.level:hover {
  transform: scale(1.1);
}

.locked {
  background: #999;
}

/* المسار المنقط */
.path {
  position: absolute;
  width: 6px;
  border-left: 6px dashed rgba(0,0,0,0.3);
  transform-origin: top;
}
</style>

</head>

<body>

<div class="map" id="map"></div>

<script>

let unlocked = parseInt(localStorage.getItem("unlocked")) || 1;

const map = document.getElementById("map");

/* نستخدم center بدل left عشوائي */
const center = window.innerWidth / 2;

/* مسار متعرج */
const levels = [];

for (let i = 0; i < 20; i++) {
  let offset = (i % 2 === 0) ? -120 : 120;

  levels.push({
    x: center + offset,
    y: 1500 - (i * 120)
  });
}

/* رسم المراحل */
levels.forEach((pos, i) => {

  const div = document.createElement("div");
  div.className = "level";
  div.innerText = i + 1;

  div.style.left = pos.x + "px";
  div.style.top = pos.y + "px";

  if (i + 1 > unlocked) {
    div.classList.add("locked");
  } else {
    div.onclick = () => startLevel(i + 1);
  }

  map.appendChild(div);

  /* رسم الخط بين المراحل */
  if (i > 0) {
    const prev = levels[i - 1];

    const line = document.createElement("div");
    line.className = "path";

    const dx = pos.x - prev.x;
    const dy = pos.y - prev.y;
    const distance = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx) * (180 / Math.PI);

    line.style.height = distance + "px";
    line.style.left = prev.x + 30 + "px";
    line.style.top = prev.y + 30 + "px";
    line.style.transform = `rotate(${angle}deg)`;

    map.appendChild(line);
  }

});

function startLevel(level) {
  alert("🔥 Level " + level);

  if (level === unlocked) {
    unlocked++;
    localStorage.setItem("unlocked", unlocked);
    location.reload();
  }
}

</script>

</body>
</html>
