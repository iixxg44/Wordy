<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lexora</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(#a8e6cf, #dcedc1);
  margin: 0;
  text-align: center;
}

h1 {
  padding: 20px;
}

.levels {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  padding: 20px;
}

.level {
  padding: 20px;
  border-radius: 15px;
  background: white;
  font-size: 20px;
  cursor: pointer;
}

.locked {
  background: #ccc;
  cursor: not-allowed;
}
</style>

</head>

<body>

<h1>🌍 Levels</h1>

<div class="levels" id="levels"></div>

<script>

let unlocked = 1; // عدد المراحل المفتوحة

const container = document.getElementById("levels");

for (let i = 1; i <= 30; i++) {
  const div = document.createElement("div");

  div.innerText = i;

  if (i <= unlocked) {
    div.className = "level";
    div.onclick = () => startLevel(i);
  } else {
    div.className = "level locked";
  }

  container.appendChild(div);
}

function startLevel(level) {
  alert("Start Level " + level);

  // بعد النجاح نفتح المرحلة اللي بعدها
  if (level === unlocked) {
    unlocked++;
    localStorage.setItem("unlocked", unlocked);
    location.reload();
  }
}

// تحميل التقدم
if (localStorage.getItem("unlocked")) {
  unlocked = parseInt(localStorage.getItem("unlocked"));
}

</script>

</body>
</html>
