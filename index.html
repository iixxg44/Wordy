<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lexora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #a8e6cf, #dcedc1);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* شاشة التسجيل */
.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 90%;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
}

/* الشخصيات */
.avatars {
  display: flex;
  justify-content: space-around;
  margin: 10px 0;
}

.avatar {
  font-size: 30px;
  cursor: pointer;
}

.selected {
  border: 2px solid black;
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="card" id="auth">

<h1>🚀 Lexora</h1>

<input id="username" placeholder="Username">
<input id="password" placeholder="Password" type="password">

<div class="avatars">
  <div class="avatar" onclick="selectAvatar(this)">🧑</div>
  <div class="avatar" onclick="selectAvatar(this)">👩</div>
  <div class="avatar" onclick="selectAvatar(this)">🧒</div>
</div>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

</div>

<script>

let selectedAvatar = "🧑";

/* اختيار شخصية */
function selectAvatar(el) {
  document.querySelectorAll(".avatar").forEach(a => a.classList.remove("selected"));
  el.classList.add("selected");
  selectedAvatar = el.innerText;
}

/* تسجيل حساب */
function signup() {
  const user = username.value;
  const pass = password.value;

  if (!user || !pass) {
    alert("Fill everything");
    return;
  }

  if (localStorage.getItem("user_" + user)) {
    alert("❌ Username already taken");
    return;
  }

  const data = {
    password: pass,
    avatar: selectedAvatar,
    level: 1
  };

  localStorage.setItem("user_" + user, JSON.stringify(data));
  localStorage.setItem("currentUser", user);

  startApp();
}

/* تسجيل دخول */
function login() {
  const user = username.value;
  const pass = password.value;

  const data = JSON.parse(localStorage.getItem("user_" + user));

  if (!data || data.password !== pass) {
    alert("❌ Wrong login");
    return;
  }

  localStorage.setItem("currentUser", user);

  startApp();
}

/* بدء التطبيق */
function startApp() {
  const user = localStorage.getItem("currentUser");
  const data = JSON.parse(localStorage.getItem("user_" + user));

  document.body.innerHTML = `
    <h1 style="text-align:center">${data.avatar} Welcome ${user}</h1>
    <p style="text-align:center">Level: ${data.level}</p>
  `;
}

</script>

</body>
</html>
