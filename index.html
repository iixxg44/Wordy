<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lexora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#b2f7ef, #eff7f6);
  overflow-x: hidden;
}

/* تسجيل */
.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
  margin: auto;
  margin-top: 100px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input {
  padding: 10px;
  width: 90%;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  cursor: pointer;
  margin-top: 5px;
}

.avatars {
  display: flex;
  justify-content: space-around;
  margin: 10px 0;
}

.avatar {
  font-size: 30px;
  cursor: pointer;
}

/* الخريطة */
.map {
  position: relative;
  width: 100%;
  height: 1600px;
}

/* المرحلة */
.level {
  position: absolute;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #111;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.locked {
  background: #bbb;
}

/* الخط */
.line {
  position: absolute;
  width: 6px;
  border-left: 6px dashed rgba(0,0,0,0.3);
  transform-origin: top;
}

/* الشخصية */
.player {
  position: absolute;
  font-size: 32px;
  transition: 0.5s linear;
}
</style>

</head>

<body>

<div id="app"></div>

<script>

let selectedAvatar = "🧑";

/* تسجيل */
function showAuth() {
  app.innerHTML = `
    <div class="card">
      <h2>Lexora</h2>
      <input id="username" placeholder="Username">
      <input id="password" placeholder="Password" type="password">

      <div class="avatars">
        <div class="avatar" onclick="selectedAvatar='🧑'">🧑</div>
        <div class="avatar" onclick="selectedAvatar='👩'">👩</div>
        <div class="avatar" onclick="selectedAvatar='🧒'">🧒</div>
      </div>

      <button onclick="signup()">Sign Up</button>
      <button onclick="login()">Login</button>
    </div>
  `;
}

function signup() {
  const user = username.value;
  const pass = password.value;

  if (!user || !pass) return alert("Fill all");

  if (localStorage.getItem("user_" + user)) {
    return alert("Username taken");
  }

  localStorage.setItem("user_" + user, JSON.stringify({
    password: pass,
    avatar: selectedAvatar,
    level: 1
  }));

  localStorage.setItem("currentUser", user);
  startApp();
}

function login() {
  const user = username.value;
  const pass = password.value;

  const data = JSON.parse(localStorage.getItem("user_" + user));

  if (!data || data.password !== pass) return alert("Wrong");

  localStorage.setItem("currentUser", user);
  startApp();
}

/* التطبيق */
function startApp() {
  const user = localStorage.getItem("currentUser");
  let data = JSON.parse(localStorage.getItem("user_" + user));

  app.innerHTML = `<div class="map" id="map"></div>`;
  const map = document.getElementById("map");

  const center = window.innerWidth / 2;

  let levels = [];

  for (let i = 0; i < 15; i++) {
    let offset = (i % 2 === 0) ? -120 : 120;

    levels.push({
      x: center + offset,
      y: 1400 - (i * 100)
    });
  }

  levels.forEach((pos, i) => {

    const div = document.createElement("div");
    div.className = "level";
    div.innerText = i + 1;

    div.style.left = pos.x + "px";
    div.style.top = pos.y + "px";

    if (i + 1 > data.level) div.classList.add("locked");
    else div.onclick = () => playLevel(i + 1);

    map.appendChild(div);

    /* رسم الخط */
    if (i > 0) {
      const prev = levels[i - 1];

      const line = document.createElement("div");
      line.className = "line";

      const dx = pos.x - prev.x;
      const dy = pos.y - prev.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      line.style.height = dist + "px";
      line.style.left = prev.x + 30 + "px";
      line.style.top = prev.y + 30 + "px";
      line.style.transform = `rotate(${angle}deg)`;

      map.appendChild(line);
    }

  });

  /* الشخصية */
  const player = document.createElement("div");
  player.className = "player";
  player.innerText = data.avatar;

  map.appendChild(player);

  movePlayer(player, levels[data.level - 1]);
}

/* حركة ناعمة */
function movePlayer(el, pos) {
  el.style.left = pos.x + "px";
  el.style.top = (pos.y - 50) + "px";
}

/* لعب */
function playLevel(level) {
  const user = localStorage.getItem("currentUser");
  let data = JSON.parse(localStorage.getItem("user_" + user));

  alert("Level " + level);

  if (level === data.level) {
    data.level++;
    localStorage.setItem("user_" + user, JSON.stringify(data));
  }

  startApp();
}

/* تشغيل */
if (localStorage.getItem("currentUser")) startApp();
else showAuth();

</script>

</body>
</html>
