<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexora</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #dff7ea;
      --bg2: #f8fff9;
      --card: rgba(255, 255, 255, 0.92);
      --text: #1d2b24;
      --muted: #6b7a72;
      --primary: #4caf7a;
      --primary-dark: #2f8f60;
      --shadow: 0 18px 45px rgba(35, 74, 49, 0.14);
      --locked: #cdd8d1;
      --path: rgba(71, 117, 88, 0.25);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffffff 0%, rgba(255,255,255,0.45) 18%, transparent 42%),
        radial-gradient(circle at top right, #e8fff0 0%, rgba(232,255,240,0.5) 18%, transparent 40%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
    }

    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.8);
    }

    .brand {
      text-align: center;
      margin-bottom: 22px;
    }

    .brand-badge {
      width: 72px;
      height: 72px;
      margin: 0 auto 12px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      font-size: 36px;
      background: linear-gradient(135deg, #ffffff, #d9f8e8);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 12px 24px rgba(76,175,122,0.15);
    }

    .brand h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 0.5px;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
      background: #edf8f0;
      padding: 6px;
      border-radius: 16px;
    }

    .tab-btn {
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: transparent;
      color: #557363;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: white;
      color: var(--text);
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      color: #4f6659;
      font-weight: bold;
    }

    .input {
      width: 100%;
      border: 1px solid #d6e9db;
      background: #fff;
      border-radius: 15px;
      padding: 14px 14px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    .input:focus {
      border-color: #95d7af;
      box-shadow: 0 0 0 4px rgba(149,215,175,0.2);
    }

    .avatar-card {
      margin-top: 8px;
      background: linear-gradient(180deg, #f4fff7, #ecfbf2);
      border: 1px solid #dcefe3;
      border-radius: 22px;
      padding: 16px;
    }

    .avatar-title {
      font-size: 14px;
      font-weight: bold;
      color: #547060;
      margin-bottom: 12px;
    }

    .avatar-picker {
      display: grid;
      grid-template-columns: 52px 1fr 52px;
      align-items: center;
      gap: 10px;
    }

    .arrow-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-size: 24px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: transform 0.15s;
    }

    .arrow-btn:hover {
      transform: translateY(-1px);
    }

    .avatar-preview {
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 8px 18px rgba(0,0,0,0.06);
    }

    .avatar-big {
      font-size: 66px;
      line-height: 1;
      margin-bottom: 10px;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.12));
    }

    .avatar-name {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .avatar-desc {
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      box-shadow: 0 12px 25px rgba(76,175,122,0.28);
      margin-top: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 15px 30px rgba(76,175,122,0.34);
    }

    .secondary-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      background: #edf7f0;
      color: #355646;
      margin-top: 10px;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: #607167;
      font-size: 13px;
      min-height: 18px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.74);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mini-avatar {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 30px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    .user-meta {
      min-width: 0;
    }

    .user-name {
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #355646;
      box-shadow: 0 8px 18px rgba(0,0,0,0.06);
    }

    .map-wrap {
      padding: 14px 14px 40px;
    }

    .world-card {
      max-width: 920px;
      margin: 0 auto 16px;
      background: rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .world-title {
      font-size: 20px;
      font-weight: bold;
    }

    .world-sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 5px;
    }

    .map {
      position: relative;
      width: 100%;
      max-width: 920px;
      height: 1800px;
      margin: 0 auto;
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,0.6), transparent 18%),
        radial-gradient(circle at 80% 14%, rgba(255,255,255,0.45), transparent 16%),
        linear-gradient(90deg, #d7f4df 0%, #dff8e6 16%, #ccefd5 16%, #ccefd5 32%, #dff8e6 32%, #dff8e6 48%, #ccefd5 48%, #ccefd5 64%, #dff8e6 64%, #dff8e6 80%, #ccefd5 80%, #ccefd5 100%);
    }

    .map::before,
    .map::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .map::before {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 22%, transparent 78%, rgba(255,255,255,0.08));
    }

    .path-line {
      position: absolute;
      height: 8px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(
          90deg,
          var(--path) 0 16px,
          transparent 16px 28px
        );
      transform-origin: left center;
      z-index: 1;
    }

    .level {
      position: absolute;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      font-weight: bold;
      color: white;
      z-index: 3;
      box-shadow: 0 15px 25px rgba(0,0,0,0.14);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .level:hover {
      transform: scale(1.05);
      box-shadow: 0 18px 28px rgba(0,0,0,0.18);
    }

    .level.open {
      background: radial-gradient(circle at 30% 30%, #6fd69a, #2e9f68);
    }

    .level.current {
      box-shadow: 0 0 0 7px rgba(255,255,255,0.8), 0 0 0 14px rgba(111,214,154,0.25), 0 15px 25px rgba(0,0,0,0.14);
    }

    .level.locked {
      background: linear-gradient(180deg, #d9e3dd, #bcc8c1);
      color: #7a8880;
      cursor: not-allowed;
    }

    .level.done {
      background: radial-gradient(circle at 30% 30%, #4fd18d, #21885a);
    }

    .level-label {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -24px;
      font-size: 12px;
      font-weight: bold;
      color: #476455;
      white-space: nowrap;
      pointer-events: none;
    }

    .player {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 42px;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 16px 28px rgba(0,0,0,0.16);
      z-index: 5;
      transition: left 0.55s ease, top 0.55s ease, transform 0.2s ease;
      border: 4px solid rgba(255,255,255,0.95);
    }

    .player.bounce {
      transform: scale(1.08);
    }

    .map-title {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      background: rgba(255,255,255,0.78);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 10px 18px rgba(0,0,0,0.07);
    }

    .bubble {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255,255,255,0.17);
      filter: blur(1px);
      z-index: 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(22, 36, 28, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }

    .modal {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.24);
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 25px;
    }

    .modal p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .quiz-word {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      margin: 8px 0 18px;
      color: #2b513d;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid #d5e9db;
      background: #f9fffb;
      color: #274635;
      border-radius: 16px;
      padding: 14px;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.15s;
    }

    .option-btn:hover {
      background: #f1fbf5;
    }

    .close-btn {
      margin-top: 8px;
      background: #edf7f0;
      color: #355646;
      box-shadow: none;
    }

    @media (max-width: 700px) {
      .auth-card {
        padding: 22px;
      }

      .map {
        height: 1680px;
        border-radius: 28px;
      }

      .level {
        width: 68px;
        height: 68px;
        font-size: 22px;
      }

      .player {
        width: 64px;
        height: 64px;
        font-size: 38px;
      }

      .world-card {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const avatars = [
      { icon: "🦊", name: "Foxy", desc: "Fast and smart" },
      { icon: "🐼", name: "Panda", desc: "Cute and calm" },
      { icon: "🐯", name: "Tiger", desc: "Brave learner" },
      { icon: "🐵", name: "Momo", desc: "Playful and funny" },
      { icon: "🦁", name: "Leo", desc: "Strong and confident" },
      { icon: "🐰", name: "Bunny", desc: "Sweet and quick" },
      { icon: "🐸", name: "Froggy", desc: "Happy jumper" },
      { icon: "🐻", name: "Bear", desc: "Cozy and kind" }
    ];

    const quizData = [
      { word: "Apple", correct: "تفاح", options: ["تفاح", "كتاب", "سيارة"] },
      { word: "Book", correct: "كتاب", options: ["قلم", "كتاب", "باب"] },
      { word: "Water", correct: "ماء", options: ["خبز", "حليب", "ماء"] },
      { word: "Cat", correct: "قطة", options: ["كلب", "قطة", "شجرة"] },
      { word: "Sun", correct: "شمس", options: ["قمر", "شمس", "نجمة"] },
      { word: "House", correct: "بيت", options: ["مدرسة", "بيت", "طاولة"] },
      { word: "Milk", correct: "حليب", options: ["حليب", "عصير", "زيت"] },
      { word: "Car", correct: "سيارة", options: ["قطار", "دراجة", "سيارة"] },
      { word: "Bird", correct: "طائر", options: ["سمكة", "طائر", "أسد"] },
      { word: "School", correct: "مدرسة", options: ["مستشفى", "مدرسة", "غرفة"] }
    ];

    let mode = "signup";
    let avatarIndex = 0;

    function getUserKey(username) {
      return "user_" + username.trim().toLowerCase();
    }

    function getCurrentUser() {
      return localStorage.getItem("currentUser");
    }

    function setCurrentUser(username) {
      localStorage.setItem("currentUser", username.trim().toLowerCase());
    }

    function getUserData(username) {
      const raw = localStorage.getItem(getUserKey(username));
      return raw ? JSON.parse(raw) : null;
    }

    function saveUserData(username, data) {
      localStorage.setItem(getUserKey(username), JSON.stringify(data));
    }

    function showAuth(message = "") {
      const currentAvatar = avatars[avatarIndex];

      document.getElementById("app").innerHTML = `
        <div class="auth-wrap">
          <div class="auth-card">
            <div class="brand">
              <div class="brand-badge">📚</div>
              <h1>Lexora</h1>
              <p>Fun English learning for Arabic kids</p>
            </div>

            <div class="tabs">
              <button class="tab-btn ${mode === "signup" ? "active" : ""}" onclick="switchMode('signup')">Sign Up</button>
              <button class="tab-btn ${mode === "login" ? "active" : ""}" onclick="switchMode('login')">Login</button>
            </div>

            <div class="field">
              <label>Username</label>
              <input class="input" id="username" placeholder="Choose a username" />
            </div>

            <div class="field">
              <label>Password</label>
              <input class="input" id="password" type="password" placeholder="Enter your password" />
            </div>

            ${mode === "signup" ? `
              <div class="avatar-card">
                <div class="avatar-title">Choose your character</div>
                <div class="avatar-picker">
                  <button class="arrow-btn" onclick="changeAvatar(-1)">‹</button>
                  <div class="avatar-preview">
                    <div class="avatar-big">${currentAvatar.icon}</div>
                    <div class="avatar-name">${currentAvatar.name}</div>
                    <div class="avatar-desc">${currentAvatar.desc}</div>
                  </div>
                  <button class="arrow-btn" onclick="changeAvatar(1)">›</button>
                </div>
              </div>
            ` : ""}

            <button class="action-btn" onclick="${mode === "signup" ? "signup()" : "login()"}">
              ${mode === "signup" ? "Create account" : "Login"}
            </button>

            <div class="hint">${message}</div>
          </div>
        </div>
      `;
    }

    function switchMode(newMode) {
      mode = newMode;
      showAuth("");
    }

    function changeAvatar(direction) {
      avatarIndex += direction;

      if (avatarIndex < 0) avatarIndex = avatars.length - 1;
      if (avatarIndex >= avatars.length) avatarIndex = 0;

      showAuth("");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      if (usernameInput) usernameInput.focus();
    }

    function signup() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (username.length < 3) {
        showAuth("Username must be at least 3 letters.");
        return;
      }

      if (password.length < 3) {
        showAuth("Password must be at least 3 letters.");
        return;
      }

      const key = getUserKey(username);
      if (localStorage.getItem(key)) {
        showAuth("This username is already taken.");
        return;
      }

      const chosen = avatars[avatarIndex];

      const data = {
        username: username,
        password: password,
        avatarIndex: avatarIndex,
        level: 1,
        stars: 0
      };

      localStorage.setItem(key, JSON.stringify(data));
      setCurrentUser(username);
      renderMap();
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      const user = getUserData(username);
      if (!user) {
        showAuth("This account does not exist.");
        return;
      }

      if (user.password !== password) {
        showAuth("Wrong password.");
        return;
      }

      setCurrentUser(username);
      renderMap();
    }

    function logout() {
      localStorage.removeItem("currentUser");
      mode = "login";
      showAuth("");
    }

    function openAvatarEditor() {
      const currentUser = getCurrentUser();
      const user = getUserData(currentUser);
      if (!user) return;

      avatarIndex = user.avatarIndex || 0;

      const currentAvatar = avatars[avatarIndex];

      const modal = document.createElement("div");
      modal.className = "modal-backdrop";
      modal.id = "avatarModal";

      modal.innerHTML = `
        <div class="modal">
          <h3>Choose your character</h3>
          <p>Pick the one you want to play with.</p>

          <div class="avatar-card">
            <div class="avatar-picker">
              <button class="arrow-btn" onclick="modalChangeAvatar(-1)">‹</button>
              <div class="avatar-preview">
                <div class="avatar-big" id="modalAvatarIcon">${currentAvatar.icon}</div>
                <div class="avatar-name" id="modalAvatarName">${currentAvatar.name}</div>
                <div class="avatar-desc" id="modalAvatarDesc">${currentAvatar.desc}</div>
              </div>
              <button class="arrow-btn" onclick="modalChangeAvatar(1)">›</button>
            </div>
          </div>

          <button class="action-btn" onclick="saveAvatarChoice()">Save character</button>
          <button class="secondary-btn close-btn" onclick="closeModal('avatarModal')">Close</button>
        </div>
      `;

      document.body.appendChild(modal);
    }

    function modalChangeAvatar(direction) {
      avatarIndex += direction;

      if (avatarIndex < 0) avatarIndex = avatars.length - 1;
      if (avatarIndex >= avatars.length) avatarIndex = 0;

      const chosen = avatars[avatarIndex];
      document.getElementById("modalAvatarIcon").textContent = chosen.icon;
      document.getElementById("modalAvatarName").textContent = chosen.name;
      document.getElementById("modalAvatarDesc").textContent = chosen.desc;
    }

    function saveAvatarChoice() {
      const currentUser = getCurrentUser();
      const user = getUserData(currentUser);
      if (!user) return;

      user.avatarIndex = avatarIndex;
      saveUserData(currentUser, user);

      closeModal("avatarModal");
      renderMap();
    }

    function closeModal(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    function renderMap() {
      const currentUser = getCurrentUser();
      const user = getUserData(currentUser);

      if (!user) {
        showAuth("");
        return;
      }

      const avatar = avatars[user.avatarIndex] || avatars[0];
      const totalLevels = 20;
      const currentWorld = Math.ceil(user.level / 10);

      document.getElementById("app").innerHTML = `
        <div class="topbar">
          <div class="top-left">
            <div class="mini-avatar">${avatar.icon}</div>
            <div class="user-meta">
              <div class="user-name">${user.username}</div>
              <div class="user-sub">Level ${user.level} · ${user.stars || 0} stars</div>
            </div>
          </div>

          <div class="top-actions">
            <button class="pill-btn" onclick="openAvatarEditor()">Change character</button>
            <button class="pill-btn" onclick="logout()">Logout</button>
          </div>
        </div>

        <div class="map-wrap">
          <div class="world-card">
            <div>
              <div class="world-title">World ${currentWorld}</div>
              <div class="world-sub">Every 10 levels opens a new world</div>
            </div>
            <div class="world-sub">Complete levels to move upward</div>
          </div>

          <div class="map" id="map">
            <div class="map-title">Learning Journey</div>
          </div>
        </div>
      `;

      const map = document.getElementById("map");
      const mapWidth = map.clientWidth;
      const center = mapWidth / 2;

      const positions = [];
      const yStart = 1560;
      const stepY = 120;
      const offsets = [0, 170, -170, 110, -110, 180, -180, 90, -90, 0];

      for (let i = 0; i < totalLevels; i++) {
        const waveIndex = i % offsets.length;
        positions.push({
          x: center + offsets[waveIndex],
          y: yStart - i * stepY
        });
      }

      const bubbles = [
        { x: 70, y: 120, s: 60 },
        { x: mapWidth - 120, y: 240, s: 88 },
        { x: 120, y: 610, s: 76 },
        { x: mapWidth - 170, y: 980, s: 66 },
        { x: 200, y: 1330, s: 54 }
      ];

      bubbles.forEach(b => {
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.style.left = b.x + "px";
        bubble.style.top = b.y + "px";
        bubble.style.width = b.s + "px";
        bubble.style.height = b.s + "px";
        map.appendChild(bubble);
      });

      for (let i = 0; i < positions.length - 1; i++) {
        const p1 = positions[i];
        const p2 = positions[i + 1];

        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;

        const line = document.createElement("div");
        line.className = "path-line";
        line.style.width = dist + "px";
        line.style.left = p1.x + "px";
        line.style.top = p1.y + "px";
        line.style.transform = `rotate(${angle}deg)`;
        map.appendChild(line);
      }

      positions.forEach((pos, index) => {
        const levelNum = index + 1;
        const btn = document.createElement("button");
        btn.className = "level";
        btn.style.left = (pos.x - 39) + "px";
        btn.style.top = (pos.y - 39) + "px";

        const label = document.createElement("div");
        label.className = "level-label";
        label.textContent = levelNum <= 10 ? "World 1" : "World 2";
        btn.appendChild(label);

        if (levelNum < user.level) {
          btn.classList.add("done");
          btn.innerHTML = `✓<div class="level-label">${levelNum <= 10 ? "World 1" : "World 2"}</div>`;
          btn.onclick = () => openLevel(levelNum);
        } else if (levelNum === user.level) {
          btn.classList.add("open", "current");
          btn.textContent = levelNum;
          btn.appendChild(label);
          btn.onclick = () => openLevel(levelNum);
        } else {
          btn.classList.add("locked");
          btn.textContent = "🔒";
          btn.appendChild(label);
        }

        map.appendChild(btn);
      });

      const player = document.createElement("div");
      player.className = "player";
      player.id = "player";
      player.textContent = avatar.icon;
      map.appendChild(player);

      const currentPos = positions[Math.max(0, Math.min(user.level - 1, positions.length - 1))];
      movePlayerTo(currentPos.x, currentPos.y);

      setTimeout(() => {
        const targetScroll = Math.max(0, currentPos.y - window.innerHeight / 2);
        window.scrollTo({ top: targetScroll, behavior: "smooth" });
      }, 100);
    }

    function movePlayerTo(x, y) {
      const player = document.getElementById("player");
      if (!player) return;

      player.style.left = (x - 36) + "px";
      player.style.top = (y - 98) + "px";

      player.classList.add("bounce");
      setTimeout(() => player.classList.remove("bounce"), 220);
    }

    function openLevel(levelNum) {
      const question = quizData[(levelNum - 1) % quizData.length];
      const shuffled = [...question.options].sort(() => Math.random() - 0.5);

      const modal = document.createElement("div");
      modal.className = "modal-backdrop";
      modal.id = "levelModal";

      modal.innerHTML = `
        <div class="modal">
          <h3>Level ${levelNum}</h3>
          <p>Choose the correct Arabic meaning of the English word.</p>
          <div class="quiz-word">${question.word}</div>
          <div id="optionsWrap">
            ${shuffled.map(opt => `
              <button class="option-btn" onclick="answerLevel(${levelNum}, '${question.correct}', '${opt.replace(/'/g, "\\'")}')">${opt}</button>
            `).join("")}
          </div>
          <button class="secondary-btn close-btn" onclick="closeModal('levelModal')">Close</button>
        </div>
      `;

      document.body.appendChild(modal);
    }

    function answerLevel(levelNum, correct, chosen) {
      if (chosen !== correct) {
        alert("Wrong answer. Try again.");
        return;
      }

      const currentUser = getCurrentUser();
      const user = getUserData(currentUser);
      if (!user) return;

      const oldLevel = user.level;

      if (levelNum === user.level) {
        user.level = Math.min(user.level + 1, 20);
        user.stars = (user.stars || 0) + 1;
        saveUserData(currentUser, user);
      }

      closeModal("levelModal");
      renderMap();

      setTimeout(() => {
        if (user.level !== oldLevel) {
          alert("Great job! You passed the level.");
        } else {
          alert("Nice! You already finished this level before.");
        }
      }, 200);
    }

    function boot() {
      const currentUser = getCurrentUser();
      if (currentUser && getUserData(currentUser)) {
        renderMap();
      } else {
        showAuth("");
      }
    }

    boot();
  </script>
</body>
</html>
