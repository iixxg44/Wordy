<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordy</title>
<style>
/* (نفس الستايل تبعك بدون تغيير) */
*{box-sizing:border-box;}
body{margin:0;font-family:Arial;}
.action-btn{padding:12px;margin:5px;width:100%;border:none;border-radius:10px;background:#4caf7a;color:#fff;font-weight:bold;cursor:pointer;}
.auth-wrap{display:flex;justify-content:center;align-items:center;height:100vh;}
.auth-card{background:#fff;padding:20px;border-radius:20px;width:300px;text-align:center;}
</style>
</head>

<body>
<div id="app"></div>

<script>

const avatars = [{icon:"🦊"},{icon:"🐼"}];

let mode="login";

function getUserKey(u){return "user_"+u;}
function getCurrentUser(){return localStorage.getItem("currentUser");}
function setCurrentUser(u){localStorage.setItem("currentUser",u);}
function getUserData(u){return JSON.parse(localStorage.getItem(getUserKey(u)));}

function saveUserData(u,d){localStorage.setItem(getUserKey(u),JSON.stringify(d));}

/* ================= LOGIN ================= */

function showAuth(){
document.getElementById("app").innerHTML=`
<div class="auth-wrap">
<div class="auth-card">
<h2>Wordy</h2>

<input id="username" placeholder="username"><br><br>
<input id="password" placeholder="password"><br><br>

<button class="action-btn" onclick="login()">Login</button>
<button class="action-btn" onclick="signup()">Sign up</button>

</div>
</div>`;
}

function signup(){
let u=username.value;
let p=password.value;

saveUserData(u,{username:u,password:p,grade:null,world:1,level:1});
setCurrentUser(u);
showGradeSelect();
}

function login(){
let u=username.value;
let p=password.value;
let user=getUserData(u);

if(!user || user.password!=p){alert("wrong");return;}

setCurrentUser(u);

if(!user.grade){
showGradeSelect();
}else{
showWorlds();
}
}

/* ================= GRADE ================= */

function showGradeSelect(){
document.getElementById("app").innerHTML=`
<div class="auth-wrap">
<div class="auth-card">
<h2>Choose Grade</h2>

${Array.from({length:10},(_,i)=>i+3).map(g=>
`<button class="action-btn" onclick="selectGrade(${g})">Grade ${g}</button>`
).join("")}

</div>
</div>`;
}

function selectGrade(g){
let u=getCurrentUser();
let user=getUserData(u);

user.grade=g;
saveUserData(u,user);

showWorlds();
}

/* ================= WORLDS ================= */

function showWorlds(){
document.getElementById("app").innerHTML=`
<div class="auth-wrap">
<div class="auth-card">
<h2>Choose World</h2>

<button class="action-btn" onclick="enterWorld(1)">🌿 Green</button>
<button class="action-btn" onclick="enterWorld(2)">🌙 Night</button>
<button class="action-btn" onclick="enterWorld(3)">💰 Gold</button>

</div>
</div>`;
}

function enterWorld(w){
let u=getCurrentUser();
let user=getUserData(u);

user.world=w;
saveUserData(u,user);

renderMap();
}

/* ================= QUESTIONS ================= */

function getQuestion(grade){

if(grade<=5){
return {
q:"I ___ a student",
a:"am",
o:["am","is","are"]
};
}

if(grade<=8){
return {
q:"He ___ football every day",
a:"plays",
o:["play","plays","played"]
};
}

return {
q:"If I ___ time I will help you",
a:"have",
o:["have","had","has"]
};
}

/* ================= GAME ================= */

function renderMap(){
let user=getUserData(getCurrentUser());

document.getElementById("app").innerHTML=`
<div class="auth-wrap">
<div class="auth-card">
<h3>Level ${user.level}</h3>

<button class="action-btn" onclick="openLevel()">Start</button>

<button class="action-btn" onclick="showWorlds()">Back</button>
</div>
</div>`;
}

function openLevel(){
let user=getUserData(getCurrentUser());
let q=getQuestion(user.grade);

document.getElementById("app").innerHTML=`
<div class="auth-wrap">
<div class="auth-card">

<h3>${q.q}</h3>

${q.o.map(opt=>
`<button class="action-btn" onclick="answer('${opt}','${q.a}')">${opt}</button>`
).join("")}

</div>
</div>`;
}

function answer(chosen,correct){
if(chosen==correct){
let u=getCurrentUser();
let user=getUserData(u);

user.level++;
saveUserData(u,user);

alert("صح 🔥");
renderMap();
}else{
alert("غلط ❌");
}
}

/* ================= START ================= */

showAuth();

</script>
</body>
</html>
